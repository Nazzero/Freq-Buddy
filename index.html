<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Chart Sidekick</title>
<link rel="icon" href="data:,"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
  :root{
    --bg:#0d0d0d; --bg-2:#141414; --panel:#1c1c1c; --panel-2:#262626;
    --border:#2e2e2e; --border-soft:#222; --grid:#222;
    --accent:#e23636; --accent-2:#b62828; --accent-soft:rgba(226,54,54,.16);
    --accent-line:rgba(226,54,54,.45);
    --text:#e6e6e6; --text-2:#9a9a9a; --text-3:#5f5f5f;
    --up:#26a69a; --down:#e23636; --danger:#e5534b; --warn:#e3b341; --ok:#56b6c2;
    --r:8px; --r-sm:6px; --r-lg:12px;
    --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --sans:'IBM Plex Sans',-apple-system,'Segoe UI',system-ui,sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; font-family:var(--sans); background:var(--bg); color:var(--text); font-size:13px; -webkit-font-smoothing:antialiased; }
  #app{ display:flex; height:100vh; }
  #left{ flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }

  /* ---- toolbar (TradingView-style top bar) ---- */
  #toolbar{ display:flex; gap:4px; align-items:center; padding:5px 10px; background:var(--bg); border-bottom:1px solid var(--border); flex-wrap:nowrap; min-height:44px; }
  .tb-div{ width:1px; height:22px; background:var(--border); margin:0 6px; flex:0 0 auto; }
  .tb-sp{ flex:1 1 auto; }
  /* timeframe pills */
  .tb-tf{ display:flex; gap:2px; align-items:center; }
  .tf{ background:transparent; color:var(--text-2); border:none; border-radius:var(--r-sm); padding:6px 11px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; transition:background .12s,color .12s; }
  .tf:hover{ background:var(--panel-2); color:var(--text); }
  .tf.active{ color:var(--ok); }
  /* icon buttons */
  .tb-ico{ background:transparent; color:var(--text-2); border:none; border-radius:var(--r-sm); width:34px; height:32px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; transition:background .12s,color .12s; flex:0 0 auto; }
  .tb-ico svg{ width:19px; height:19px; }
  .tb-ico:hover{ background:var(--panel-2); color:var(--text); }
  .tb-ico.active{ color:var(--accent); }
  /* text+icon buttons */
  .tb-text{ background:transparent; color:var(--text); border:none; border-radius:var(--r-sm); padding:6px 10px; font:inherit; font-size:14px; display:inline-flex; align-items:center; gap:7px; cursor:pointer; transition:background .12s; flex:0 0 auto; white-space:nowrap; }
  .tb-text svg{ width:17px; height:17px; color:var(--text-2); }
  .tb-text:hover{ background:var(--panel-2); }
  .tb-text .caret-s{ color:var(--text-3); font-size:11px; }
  #pair{ background:transparent; color:var(--text); border:1px solid transparent; font-weight:600; font-family:var(--mono); letter-spacing:.3px; padding:5px 8px; border-radius:var(--r-sm); font-size:12px; cursor:pointer; }
  #pair:hover{ background:var(--panel-2); }
  #stratsel{ background:transparent; color:var(--text-2); border:1px solid var(--border); font-weight:600; font-family:var(--mono); letter-spacing:.3px; padding:5px 8px; border-radius:var(--r-sm) 0 0 var(--r-sm); border-right:none; font-size:11px; cursor:pointer; }
  #stratsel:hover{ background:var(--panel-2); color:var(--text); }
  .stratgroup{ display:inline-flex; align-items:stretch; }
  .stratgroup .stratbtn{ width:26px; height:auto; padding:0; border:1px solid var(--border); border-left:none; border-radius:0; background:transparent; color:var(--text-2); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
  .stratgroup .stratbtn svg{ width:13px; height:13px; }
  .stratgroup .stratbtn:hover{ background:var(--panel-2); color:var(--text); }
  .stratgroup #stratadd{ border-radius:0 var(--r-sm) var(--r-sm) 0; }
  /* ---- strategy add/edit modal ---- */
  #stratmodal{ position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; }
  #stratmodal.open{ display:flex; }
  #stratmodal .card{ width:460px; max-width:92vw; max-height:88vh; overflow:auto; background:var(--panel); border:1px solid var(--border); border-radius:12px; box-shadow:0 18px 50px rgba(0,0,0,.5); }
  #stratmodal .hd{ display:flex; align-items:center; justify-content:space-between; padding:16px 18px 10px; }
  #stratmodal .hd h3{ margin:0; font-size:15px; font-weight:700; color:var(--text); }
  #stratmodal .hd .x{ background:none; border:none; color:var(--text-2); font-size:20px; cursor:pointer; line-height:1; }
  #stratmodal .hd .x:hover{ color:var(--text); }
  #stratmodal .bd{ padding:4px 18px 18px; }
  #stratmodal label.fld{ display:block; font-size:11px; font-weight:600; color:var(--text-2); text-transform:uppercase; letter-spacing:.4px; margin:14px 0 6px; }
  #stratmodal select, #stratmodal input[type=text]{ width:100%; box-sizing:border-box; background:var(--panel-2); color:var(--text); border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 10px; font:inherit; font-size:13px; }
  #stratmodal .pairgrid{ display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  #stratmodal .pairchk{ display:flex; align-items:center; gap:7px; padding:6px 8px; border:1px solid var(--border); border-radius:var(--r-sm); font-size:12px; font-family:var(--mono); cursor:pointer; color:var(--text); user-select:none; }
  #stratmodal .pairchk:hover{ background:var(--panel-2); }
  #stratmodal .pairchk input{ accent-color:#2563eb; }
  #stratmodal .pairtools{ display:flex; gap:10px; margin:6px 0 0; }
  #stratmodal .pairtools a{ font-size:11px; color:#60a5fa; cursor:pointer; }
  #stratmodal .hint{ font-size:11px; color:var(--text-3,#6b7280); margin-top:5px; }
  #stratmodal .ft{ display:flex; align-items:center; gap:10px; margin-top:18px; }
  #stratmodal .ft .spacer{ flex:1; }
  #stratmodal .btn{ border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 16px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; background:var(--panel-2); color:var(--text); }
  #stratmodal .btn:hover{ background:var(--border); }
  #stratmodal .btn.primary{ background:#2563eb; border-color:#3b82f6; color:#fff; }
  #stratmodal .btn.primary:hover{ background:#3b82f6; }
  #stratmodal .btn.primary:disabled{ opacity:.5; cursor:not-allowed; }
  #stratmodal .btn.danger{ background:#3a1111; border-color:#7f1d1d; color:#fca5a5; }
  #stratmodal .btn.danger:hover{ background:#5b1414; }
  #stratmodal .err{ color:#f87171; font-size:12px; margin-top:10px; min-height:0; }
  /* progress */
  #stratmodal .prog{ display:none; margin-top:16px; }
  #stratmodal .prog.show{ display:block; }
  #stratmodal .pbar{ height:8px; border-radius:5px; background:var(--panel-2); overflow:hidden; border:1px solid var(--border); }
  #stratmodal .pfill{ height:100%; width:0%; background:linear-gradient(90deg,#2563eb,#22d3ee); transition:width .3s ease; }
  #stratmodal .pmeta{ display:flex; justify-content:space-between; font-size:12px; color:var(--text-2); margin-top:8px; }
  #stratmodal .plog{ margin-top:10px; max-height:120px; overflow:auto; background:#0b0e14; border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 10px; font-family:var(--mono); font-size:11px; color:#9aa4b2; white-space:pre-wrap; }
  /* toolbar select (timeframe) */
  .tb-sel{ background:var(--panel-2); color:var(--text); border:1px solid var(--border); border-radius:var(--r-sm); padding:5px 8px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; flex:0 0 auto; }
  .tb-sel:hover{ border-color:var(--accent-line); }
  /* candle type split control */
  .tb-candle{ position:relative; display:inline-flex; align-items:center; flex:0 0 auto; }
  .tb-caret{ background:transparent; color:var(--text-3); border:none; cursor:pointer; padding:6px 4px 6px 0; display:inline-flex; align-items:center; }
  .tb-caret:hover{ color:var(--text); }
  .candle-pop{ position:absolute; top:38px; left:0; z-index:30; background:var(--panel); border:1px solid var(--border); border-radius:var(--r); padding:4px; display:none; min-width:150px; box-shadow:0 8px 24px rgba(0,0,0,.5); }
  .candle-pop.show{ display:block; }
  .cp-item{ display:block; width:100%; text-align:left; background:transparent; color:var(--text); border:none; border-radius:var(--r-sm); padding:8px 10px; font:inherit; font-size:13px; cursor:pointer; }
  .cp-item:hover{ background:var(--panel-2); }
  .cp-item.active{ color:var(--accent); }
  /* floating y-mode button (bottom-right over chart) */
  #ymodebtn{ position:absolute; z-index:7; right:16px; bottom:42px; min-width:50px; height:36px; padding:0 12px;
             display:inline-flex; align-items:center; justify-content:center; gap:5px;
             background:rgba(28,28,28,.9); color:var(--text); border:1px solid var(--border); border-radius:10px;
             font:700 13px var(--mono); letter-spacing:.5px; cursor:pointer; backdrop-filter:blur(6px);
             box-shadow:0 4px 14px rgba(0,0,0,.45); transition:background .12s,color .12s,border-color .12s,transform .08s; }
  #ymodebtn:hover{ background:var(--panel-2); color:#fff; border-color:var(--accent-line); transform:translateY(-1px); }
  #ymodebtn:active{ transform:translateY(0); }
  #ymodebtn.log{ color:#fff; background:var(--accent); border-color:var(--accent); }
  #ymodebtn.log:hover{ background:var(--accent-2); }

  /* chart area split: left rail + chart column */
  #chartwrap{ flex:1; display:flex; min-height:0; }
  #leftrail{ width:46px; flex:0 0 auto; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 0; }
  .rail{ background:transparent; color:var(--text-2); border:none; border-radius:var(--r-sm); width:34px; height:34px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; transition:background .12s,color .12s; }
  .rail svg{ width:20px; height:20px; }
  .rail:hover{ background:var(--panel-2); color:var(--text); }
  .rail.active{ color:var(--accent); background:var(--accent-soft); }
  .rail-sp{ flex:1 1 auto; }
  /* drawing tools: one rail icon, options fly out horizontally on hover */
  .drawgroup{ position:relative; }
  .drawflyout{ position:absolute; left:100%; top:0; margin-left:6px; display:none; flex-direction:row; gap:2px;
    background:var(--panel-2); border:1px solid var(--border); border-radius:var(--r-md); padding:3px;
    box-shadow:0 6px 22px rgba(0,0,0,.5); z-index:30; }
  .drawgroup:hover .drawflyout, .drawflyout:hover, .drawflyout.pin{ display:flex; }
  /* hover bridge so the gap between trigger and flyout doesn't close it */
  .drawgroup:hover .drawflyout::before{ content:""; position:absolute; left:-8px; top:0; width:8px; height:100%; }
  /* crosshair options menu: vertical list of toggle rows */
  .chmenu{ flex-direction:column; gap:2px; min-width:188px; }
  .ch-item{ display:flex; align-items:center; gap:9px; width:100%; text-align:left;
    background:transparent; color:var(--text-2); border:none; border-radius:var(--r-sm);
    padding:8px 10px; font:inherit; font-size:12px; cursor:pointer; }
  .ch-item:hover{ background:var(--panel); color:var(--text); }
  .ch-item svg{ width:16px; height:16px; flex:0 0 auto; opacity:.7; }
  .ch-item .ch-lab{ flex:1 1 auto; white-space:nowrap; }
  .ch-item .ch-state{ flex:0 0 auto; font-size:10px; font-weight:700; letter-spacing:.5px;
    color:var(--text-3); font-family:var(--mono); }
  .ch-item .ch-state::after{ content:"OFF"; }
  .ch-item.active{ color:var(--text); }
  .ch-item.active svg{ opacity:1; color:var(--accent); }
  .ch-item.active .ch-state{ color:var(--accent); }
  .ch-item.active .ch-state::after{ content:"ON"; }

  #chartcol{ flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }
  /* chart header overlay (OHLC line) */
  #charthead{ position:absolute; z-index:6; top:8px; left:14px; pointer-events:none; font-family:var(--mono); }
  /* pair + bars-in-view, overlaid on the main plot bottom-left (just above its x-axis), low opacity */
  #plotstatus{ position:absolute; z-index:5; left:14px; pointer-events:none; font-family:var(--mono);
    font-size:10px; color:var(--text-2); opacity:.42; white-space:nowrap; letter-spacing:.2px;
    text-shadow:0 1px 2px rgba(0,0,0,.55); }
  #plotstatus:empty{ display:none; }
  .chh-row{ display:flex; align-items:center; gap:14px; line-height:1.7; }
  .chh-pair{ color:var(--text); font-weight:700; font-size:13px; }
  .chh-tf{ color:var(--ok); font-size:13px; font-weight:600; }
  .chh-strat{ color:var(--text-2); font-size:13px; }
  .ohlc{ font-size:12px; color:var(--text-2); }
  .ohlc b{ color:var(--text-3); font-weight:600; margin-right:2px; }
  .ohlc i{ color:var(--ok); font-style:normal; }
  .chh-vol{ font-size:11px; }
  .chh-lbl{ color:var(--text-2); }
  .chh-v{ color:var(--text-2); }
  .chh-v.up{ color:var(--up); }
  .chh-v.down{ color:var(--down); }
  /* overlay registry: docked strip BELOW the chart (never floats over the plot) */
  #overlaybar{ flex:0 0 auto; display:flex; flex-wrap:wrap; gap:6px; align-items:center;
    padding:6px 12px; background:var(--bg-2); border-top:1px solid var(--border-soft);
    font-family:var(--mono); max-height:74px; overflow-y:auto; }
  #overlaybar:empty{ display:none; }
  #overlaybar .ovbar-lbl{ font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:.6px; flex:0 0 auto; margin-right:2px; }
  .ovchip{ display:inline-flex; align-items:center; gap:7px; background:var(--panel-2);
    border:1px solid var(--border-soft); border-left:3px solid var(--accent); border-radius:var(--r-sm);
    padding:4px 6px 4px 9px; font-size:11px; color:var(--text-2); cursor:pointer; max-width:360px; }
  .ovchip:hover{ border-color:var(--accent-line); }
  .ovchip .ovdot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .ovchip .ovlab{ color:var(--text); font-weight:600; white-space:nowrap; }
  .ovchip .ovmeta{ color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  /* hidden state: clearly legible (dim border + strike on label), not vanishing */
  .ovchip.off{ background:transparent; border-style:dashed; border-left-style:solid; }
  .ovchip.off .ovlab{ color:var(--text-3); text-decoration:line-through; }
  .ovchip.off .ovdot{ opacity:.45; }
  .ovchip .ovtog,.ovchip .ovx{ border:none; background:transparent; color:var(--text-3); cursor:pointer;
    font-size:13px; line-height:1; padding:1px 4px; border-radius:3px; }
  .ovchip .ovtog:hover,.ovchip .ovx:hover{ background:var(--border-soft); color:var(--text); }
  .ovchip .ovx:hover{ color:var(--down); }

  #chart{ flex:1; }
  /* Y-axis zoom strip: drag up/down on the left edge to zoom the price scale only. */
  #yzone{ position:absolute; z-index:5; cursor:ns-resize; background:transparent; border:none; display:none; }
  #yzone .yhint{ display:none; }
  #subsplit{ position:absolute; left:0; right:0; height:9px; z-index:6; cursor:ns-resize; display:none;
             background:transparent; transition:background .12s; }
  #subsplit:hover, #subsplit.dragging{ background:linear-gradient(rgba(34,211,238,0)0%, rgba(34,211,238,0.18)50%, rgba(34,211,238,0)100%); }
  #subsplit .sshint{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
                     width:46px; height:3px; border-radius:2px; background:#3a4154; }
  #subsplit:hover .sshint, #subsplit.dragging .sshint{ background:var(--accent-line); }

  #splitter{ width:6px; cursor:col-resize; background:var(--panel); border-left:1px solid var(--border); flex:0 0 auto; position:relative; }
  #splitter:hover{ background:var(--accent-line); }
  /* widen the grab target without widening the visible bar */
  #splitter::before{ content:""; position:absolute; top:0; bottom:0; left:-3px; right:-3px; }

  /* ---- right panel ---- */
  #right{ width:560px; display:flex; flex-direction:column; background:var(--bg); border-left:1px solid var(--border); min-width:0; position:relative; }
  #right.collapsed{ width:0 !important; border:none; overflow:visible; }
  /* small rounded collapse bulge centered on the LEFT edge — sits over the
     splitter only at its center so the rest of the edge stays drag-resizable. */
  #rightcollapse{ position:absolute; top:50%; left:-9px; transform:translateY(-50%); z-index:21;
    width:14px; height:46px; padding:0; background:var(--accent); color:#fff;
    border:1px solid var(--accent-2); border-right:none; border-radius:8px 0 0 8px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    font-size:12px; line-height:1; box-shadow:-2px 0 6px rgba(0,0,0,.35);
    transition:background .12s,color .12s; }
  #rightcollapse svg{ width:11px; height:11px; }
  #rightcollapse:hover{ background:var(--accent-2); color:#fff; }
  /* when collapsed the panel has 0 width, so pin the bulge to the screen's right edge */
  #right.collapsed #rightcollapse{ left:auto; right:0; border-radius:8px 0 0 8px; }

  /* presets bar */
  #presetbar{ display:flex; gap:8px; align-items:center; padding:10px 12px; background:var(--bg-2); border-bottom:1px solid var(--border-soft); flex-wrap:nowrap; }
  #presetbar .lbl{ font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:.6px; flex:0 0 auto; }
  #presetbar select{ flex:1 1 auto; min-width:0; background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:9px; padding:7px 10px; font:inherit; font-size:12px; cursor:pointer; transition:border-color .12s; }
  #presetbar select:hover{ border-color:var(--accent-line); }
  .pb-icon{ display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; flex:0 0 auto; background:var(--panel); color:var(--text-3); border:1px solid var(--border); border-radius:9px; cursor:pointer; transition:background .12s,color .12s,border-color .12s; }
  .pb-icon:hover{ background:var(--panel-2); color:var(--accent); border-color:var(--accent-line); }
  .pb-icon svg{ width:17px; height:17px; }
  .pb-save{ display:inline-flex; align-items:center; gap:6px; flex:0 0 auto; height:34px; padding:0 14px; background:var(--accent); color:#fff; border:none; border-radius:9px; font:inherit; font-size:12px; font-weight:600; cursor:pointer; transition:background .12s; }
  .pb-save:hover{ background:var(--accent-2); }
  .pb-save svg{ width:16px; height:16px; }

  /* active 'On chart' panel */
  #activepanel{ border-bottom:1px solid var(--border-soft); }
  #activehead{ display:flex; align-items:center; gap:8px; padding:9px 10px; background:var(--bg-2); user-select:none; }
  #activehead .ttl{ font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--text-2); cursor:pointer; }
  #activehead .count{ font-size:10px; color:var(--text-3); font-family:var(--mono); }
  #activehead .sp{ margin-left:auto; }
  #activehead button{ background:var(--panel); color:var(--text-2); border:1px solid var(--border); border-radius:var(--r-sm); padding:4px 9px; font:inherit; font-size:10px; cursor:pointer; }
  #activehead button:hover{ border-color:var(--accent); color:var(--text); }
  #activeadd{ color:var(--accent) !important; border-color:var(--accent-line) !important; }
  #activeadd:hover{ background:var(--accent-soft) !important; }
  .caret{ font-size:10px; color:var(--text-3); transition:transform .12s; cursor:pointer; }
  #activepanel.collapsed .caret{ transform:rotate(-90deg); }
  #activepanel.collapsed #activelist{ display:none; }
  #activepanel.collapsed + #rsplit{ display:none; }
  #activelist{ max-height:26vh; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:4px; }
  /* horizontal drag handle: resize On-chart list vs Sidekick chat */
  #rsplit{ height:8px; flex:0 0 auto; cursor:ns-resize; background:var(--bg-2);
    border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:center;
    transition:background .12s; }
  #rsplit:hover, #rsplit.dragging{ background:var(--accent-soft); }
  #rsplit .rshint{ width:42px; height:3px; border-radius:2px; background:#3a4154; }
  #rsplit:hover .rshint, #rsplit.dragging .rshint{ background:var(--accent-line); }
  .arow{ display:flex; align-items:center; gap:7px; padding:6px 8px; font-size:11px; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:var(--r-sm); }
  .arow:hover{ border-color:var(--border); }
  .arow input[type=color]{ width:20px; height:20px; padding:0; border:1px solid var(--border); border-radius:4px; background:none; cursor:pointer; flex:0 0 auto; }
  .arow .nm{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:var(--mono); }
  .arow select{ background:var(--panel); color:var(--text-2); border:1px solid var(--border); border-radius:4px; font:inherit; font-size:10px; padding:3px 4px; cursor:pointer; }
  .arow .x{ cursor:pointer; color:var(--text-3); padding:0 3px; font-size:13px; }
  .arow .x:hover{ color:var(--danger); }
  /* per-indicator eye (hide line without removing) */
  .arow .eye{ cursor:pointer; color:var(--text-3); padding:0 2px; display:inline-flex; align-items:center; flex:0 0 auto; }
  .arow .eye:hover{ color:var(--text); }
  .arow.hiddenind .nm{ opacity:.4; text-decoration:line-through; }
  /* color/style popup anchored to the swatch (color + width + opacity in one place) */
  .swatch{ width:20px; height:20px; padding:0; border:1px solid var(--border); border-radius:4px; cursor:pointer; flex:0 0 auto; position:relative; }
  .swatch:hover{ border-color:var(--accent, #79c0ff); }
  .arow.hiddenind .swatch{ opacity:.4; }
  #cpop{ position:fixed; z-index:360; width:230px; max-width:calc(100vw - 16px); box-sizing:border-box; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r-md, 8px); box-shadow:0 16px 50px rgba(0,0,0,.6); padding:10px; display:none; }
  #cpop.show{ display:block; }
  #cpop input[type=color]{ width:100%; height:34px; padding:0; border:1px solid var(--border); border-radius:6px; background:none; cursor:pointer; }
  #cpop .srow{ display:flex; align-items:center; gap:6px; font-size:10px; color:var(--text-3); margin-top:9px; }
  #cpop .srow label{ flex:0 0 46px; text-transform:uppercase; letter-spacing:.04em; }
  #cpop .srow input[type=range]{ flex:1 1 0; min-width:0; height:3px; cursor:pointer; accent-color:var(--accent, #79c0ff); }
  #cpop .srow .val{ flex:0 0 30px; text-align:right; font-family:var(--mono); color:var(--text-2); }
  #cpop .srow .stp{ flex:0 0 16px; width:16px; height:16px; padding:0; line-height:1; font-size:13px; border:1px solid var(--border); border-radius:4px; background:var(--panel); color:var(--text-2); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
  #cpop .srow .stp:hover{ border-color:var(--accent, #79c0ff); color:var(--text); }

  /* ---- indicators MODAL (Favorites / Main plot / Sub-plots) ---- */
  #indmodal{ display:none; position:fixed; inset:0; background:rgba(0,8,24,.66); z-index:300; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
  #indmodal.show{ display:flex; }
  #indcard{ background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r-lg); width:min(620px,94vw); max-height:84vh; display:flex; flex-direction:column; box-shadow:0 24px 70px rgba(0,0,0,.6); overflow:hidden; }
  #indmhead{ display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid var(--border); }
  #indmhead .ttl{ font-size:14px; font-weight:700; }
  #indmhead .count{ font-size:11px; color:var(--text-3); font-family:var(--mono); }
  #indmclose{ margin-left:auto; background:var(--panel); color:var(--text-2); border:1px solid var(--border); border-radius:var(--r-sm); width:28px; height:28px; cursor:pointer; font-size:14px; }
  #indmclose:hover{ border-color:var(--accent); color:var(--text); }
  #indsearchwrap{ padding:12px 16px 0; }
  #indsearch{ width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:var(--r); padding:9px 12px; font:inherit; font-size:13px; }
  #indsearch:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  #indtabs{ display:flex; gap:4px; padding:12px 16px 0; }
  .indtab{ flex:1; background:var(--panel); color:var(--text-2); border:1px solid var(--border); border-radius:var(--r-sm); padding:7px 6px; font:inherit; font-size:12px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; transition:.12s; }
  .indtab:hover{ color:var(--text); }
  .indtab.on{ background:var(--accent-soft); border-color:var(--accent); color:var(--accent); font-weight:600; }
  .indtab .b{ font-family:var(--mono); font-size:10px; opacity:.85; background:var(--bg); border-radius:10px; padding:1px 6px; }
  .indtab.on .b{ background:rgba(226,54,54,.25); }
  #indlist{ overflow-y:auto; padding:12px 16px 16px; }
  .cat{ margin-top:6px; }
  .cat-h{ display:flex; align-items:center; gap:6px; cursor:pointer; padding:5px 2px; font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:.6px; user-select:none; }
  .cat-h .arrow{ transition:transform .12s; }
  .cat.collapsed .arrow{ transform:rotate(-90deg); }
  .cat.collapsed .chips{ display:none; }
  .chips{ display:flex; flex-wrap:wrap; gap:5px; padding:4px 0 6px 6px; }
  .tchip{ display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:5px 9px; border-radius:7px; border:1px solid var(--border); cursor:pointer; background:var(--panel); white-space:nowrap; transition:.1s; font-family:var(--mono); }
  .tchip:hover{ border-color:var(--accent); background:var(--panel-2); }
  .tchip.on{ background:var(--accent-soft); border-color:var(--accent); color:#fff; }
  .tchip .star{ cursor:pointer; color:var(--text-3); font-size:12px; line-height:1; }
  .tchip .star.fav{ color:var(--warn); }
  #indempty{ color:var(--text-3); padding:18px; text-align:center; font-size:12px; }

  /* ---- chat ---- */
  .skhead{ display:flex; align-items:center; gap:8px; padding:11px 12px; background:var(--bg-2); border-bottom:1px solid var(--border); border-top:1px solid var(--border); }
  .skhead .dot{ width:7px; height:7px; border-radius:50%; background:var(--text-3); box-shadow:none; transition:background .25s, box-shadow .25s; }
  .skhead .dot.connected{ background:var(--ok); box-shadow:0 0 8px var(--ok); }
  .skhead .dot.offline{ background:var(--danger); box-shadow:0 0 6px rgba(229,83,75,.5); }
  .skhead .ttl{ font-size:13px; font-weight:700; letter-spacing:.2px; }
  .skhead .sub{ margin-left:auto; font-size:10px; color:var(--text-3); font-family:var(--mono); }
  #logsbtn{ display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; padding:0; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--text-3); cursor:pointer; }
  #logsbtn:hover{ color:var(--text); border-color:var(--accent); }
  #logsbtn.live{ color:var(--accent); border-color:var(--accent); }
  #logsbtn svg{ width:15px; height:15px; }
  #newchatbtn{ display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; padding:0; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--text-3); cursor:pointer; }
  #newchatbtn:hover{ color:var(--text); border-color:var(--accent); }
  #newchatbtn svg{ width:15px; height:15px; }
  /* activity log panel — replaces the chat log area when open */
  #logspanel{ display:none; flex-direction:column; min-height:0; flex:1; background:var(--bg); }
  #logspanel.show{ display:flex; }
  body.logs-open #log{ display:none; }
  #logshead{ display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bg-2); border-bottom:1px solid var(--border); font-size:12px; font-weight:700; }
  #logsmeta{ margin-left:auto; font-size:10px; font-weight:400; color:var(--text-3); font-family:var(--mono); }
  #logsclose{ background:transparent; border:none; color:var(--text-3); cursor:pointer; font-size:14px; line-height:1; padding:2px 4px; }
  #logsclose:hover{ color:var(--text); }
  #logsbody{ flex:1; overflow-y:auto; padding:8px 10px; font-family:var(--mono); font-size:11px; display:flex; flex-direction:column; gap:3px; }
  .logrow{ display:flex; gap:8px; align-items:baseline; padding:3px 5px; border-radius:5px; }
  .logrow:hover{ background:var(--bg-2); }
  .logrow .lt-ts{ color:var(--text-3); flex:0 0 auto; }
  .logrow .lt-ph{ flex:0 0 64px; font-weight:700; color:var(--accent); }
  .logrow .lt-de{ flex:1; white-space:pre-wrap; word-break:break-word; color:var(--text-2); }
  .logrow .lt-ms{ color:var(--text-3); }
  .logrow.ph-error .lt-ph{ color:var(--down,#e2616a); }
  .logrow.ph-done .lt-ph{ color:var(--ok); }
  #logsempty{ color:var(--text-3); padding:14px; text-align:center; }
  /* tiny live status line under the loading spinner */
  .loading .act-now{ display:block; margin-top:5px; font-size:10px; color:var(--text-3); font-family:var(--mono); }
  .msg.bot.stopped{ opacity:.85; }
  #busydot{ display:none; width:8px; height:8px; border-radius:50%; background:var(--accent); margin-left:2px; animation:pulse 1s ease-in-out infinite; }
  #busydot.on{ display:inline-block; }
  @keyframes pulse{ 0%,100%{ opacity:.3; } 50%{ opacity:1; } }

  #log{ flex:1; overflow-y:auto; padding:14px 14px 18px; display:flex; flex-direction:column; gap:14px; }
  .msg{ padding:0; max-width:100%; word-wrap:break-word; font-size:14px; line-height:1.62; }
  .msg.user, .msg.sys{ white-space:pre-wrap; }
  /* user keeps a compact bubble, right-aligned */
  .user{ background:var(--accent); color:#fff; align-self:flex-end; border-radius:12px 12px 3px 12px; font-weight:500; max-width:88%; padding:9px 12px; }
  /* assistant = flat full-width markdown (Claude-web feel): no bubble, no inner scroll */
  .bot{ background:transparent; align-self:stretch; border:none; border-radius:0; width:100%; max-width:100%; padding:2px 0 4px; }
  .bot p{ margin:0 0 9px; } .bot p:last-child{ margin-bottom:0; }
  .bot ul, .bot ol{ margin:5px 0 9px; padding-left:22px; }
  .bot li{ margin:4px 0; }
  .bot code{ background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:1px 5px; font-size:12.5px; font-family:var(--mono); }
  .bot pre{ background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:11px 12px; overflow-x:auto; margin:9px 0; }
  .bot pre code{ border:none; padding:0; background:none; font-size:12.5px; }
  /* tables: readable; scroll horizontally if too wide rather than shattering labels */
  .bot .tblwrap{ overflow-x:auto; margin:10px 0; border-radius:6px; }
  .bot table{ border-collapse:collapse; margin:0; font-size:12.5px; min-width:100%; font-family:var(--mono); }
  .bot th, .bot td{ border:1px solid var(--border); padding:5px 9px; text-align:right; white-space:nowrap; vertical-align:top; }
  .bot td:first-child, .bot th:first-child{ text-align:left; }
  .bot th{ background:var(--bg-2); font-weight:600; }
  .bot h1,.bot h2,.bot h3,.bot h4{ margin:12px 0 6px; font-size:14px; }
  .bot strong{ color:var(--warn); }
  .bot blockquote{ margin:9px 0; padding-left:11px; border-left:3px solid var(--accent-line); color:var(--text-2); }
  .sys{ color:var(--text-3); font-size:11px; align-self:center; text-align:center; }

  /* collapsible meta line inside bot bubble */
  .meta{ margin-top:8px; font-size:10px; }
  .meta summary{ list-style:none; cursor:pointer; color:var(--text-3); font-family:var(--mono); display:inline-flex; align-items:center; gap:5px; user-select:none; }
  .meta summary::-webkit-details-marker{ display:none; }
  .meta summary::before{ content:"›"; transition:transform .12s; display:inline-block; }
  .meta[open] summary::before{ transform:rotate(90deg); }
  .meta .mbody{ margin-top:6px; color:var(--text-3); font-family:var(--mono); line-height:1.5; }
  .meta .mdl{ color:var(--warn); }

  /* AI action chips */
  .acts{ align-self:flex-start; display:flex; flex-wrap:wrap; gap:5px; max-width:92%; }
  .achip{ display:inline-flex; align-items:center; gap:6px; font-size:11px; padding:4px 10px; border-radius:20px; background:var(--accent-soft); border:1px solid var(--accent-line); color:var(--text); font-family:var(--mono); }
  .achip .g{ color:var(--accent); font-weight:700; }
  .achip.unknown{ background:var(--bg-2); border-color:var(--border); color:var(--text-3); }

  /* AI loading animation */
  .loading{ display:flex; align-items:center; gap:9px; }
  .loading .dots{ display:inline-flex; gap:4px; }
  .loading .dots i{ width:7px; height:7px; border-radius:50%; background:var(--accent); display:inline-block; animation:ld 1.1s ease-in-out infinite; }
  .loading .dots i:nth-child(2){ animation-delay:.18s; }
  .loading .dots i:nth-child(3){ animation-delay:.36s; }
  @keyframes ld{ 0%,80%,100%{ transform:translateY(0); opacity:.4; } 40%{ transform:translateY(-5px); opacity:1; } }
  .loading .lt{ font-size:12px; color:var(--text-2); }
  .shimmer{ background:linear-gradient(90deg,var(--text-3) 25%,var(--text) 50%,var(--text-3) 75%); background-size:200% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; animation:sh 1.6s linear infinite; }
  @keyframes sh{ to{ background-position:-200% 0; } }
  /* live step trail: short friendly sentences of what the analyst is doing */
  .steps{ display:flex; flex-direction:column; gap:3px; margin-top:7px; }
  .steps .step{ display:flex; align-items:center; gap:7px; font-size:11px; color:var(--text-3); font-family:var(--mono); line-height:1.3; opacity:.55; animation:stepIn .25s ease both; }
  .steps .step.cur{ color:var(--text-2); opacity:1; }
  .steps .step .si{ flex:0 0 auto; width:12px; height:12px; display:inline-flex; align-items:center; justify-content:center; }
  .steps .step.done .si{ color:var(--ok); }
  .steps .step.cur .si{ color:var(--accent); }
  .steps .step.cur .si .spin{ animation:stepspin .9s linear infinite; transform-origin:center; }
  @keyframes stepspin{ to{ transform:rotate(360deg); } }
  @keyframes stepIn{ from{ opacity:0; transform:translateY(3px); } }
  /* typewriter caret while the reply streams out */
  .msg.bot.streaming::after{ content:"▍"; color:var(--accent); animation:cbk .8s step-end infinite; margin-left:1px; }
  @keyframes cbk{ 50%{ opacity:0; } }

  /* composer (TradingView/AI-prompt style) */
  #inputbar{ display:block; padding:12px; border-top:1px solid var(--border); position:relative; background:var(--bg-2); }
  #promptcard{ background:var(--panel); border:1px solid var(--border); border-radius:18px; padding:6px; transition:border-color .12s, box-shadow .12s; }
  #promptcard:focus-within{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  #input{ width:100%; background:transparent; color:var(--text); border:none; outline:none; padding:10px 12px 6px; font:inherit; resize:none; min-height:46px; max-height:240px; overflow-y:auto; line-height:1.5; }
  #input::placeholder{ color:var(--text-3); }
  #promptfoot{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:2px 4px 2px; }
  #promptfoot .pf-left{ display:flex; align-items:center; gap:6px; min-width:0; }
  .pf-div{ width:1px; height:18px; background:var(--border); margin:0 2px; flex:0 0 auto; }
  /* model dropdown trigger */
  .modelwrap{ position:relative; flex:0 0 auto; }
  .modelbtn{ display:inline-flex; align-items:center; gap:6px; background:transparent; color:var(--text); border:none; border-radius:10px; padding:6px 8px; font:inherit; font-size:12px; cursor:pointer; transition:background .12s; }
  .modelbtn:hover{ background:var(--panel-2); }
  .model-ic{ display:inline-flex; width:16px; height:16px; align-items:center; justify-content:center; }
  .model-ic svg{ width:15px; height:15px; }
  .model-name{ max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .model-caret{ width:13px; height:13px; opacity:.5; flex:0 0 auto; }
  .modelpop{ position:absolute; bottom:42px; left:0; z-index:60; min-width:200px; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:5px; display:none; box-shadow:0 12px 32px rgba(0,0,0,.55); max-height:300px; overflow-y:auto; }
  .modelpop.show{ display:block; }
  .mp-item{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; background:transparent; color:var(--text); border:none; border-radius:8px; padding:8px 10px; font:inherit; font-size:12px; cursor:pointer; }
  .mp-item:hover{ background:var(--panel-2); }
  .mp-item .mp-ic{ width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; }
  .mp-item .mp-ic svg{ width:15px; height:15px; }
  .mp-item .mp-nm{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mp-item .mp-chk{ width:14px; height:14px; color:var(--accent); opacity:0; }
  .mp-item.sel .mp-chk{ opacity:1; }
  /* attach (+) */
  .attachbtn{ display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:10px; background:var(--panel-2); color:var(--text-3); cursor:pointer; transition:background .12s,color .12s; }
  .attachbtn:hover{ background:var(--border); color:var(--text); }
  .attachbtn svg{ width:18px; height:18px; }
  /* send arrow */
  #send{ display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; background:var(--accent); color:#fff; border:none; border-radius:11px; cursor:pointer; transition:background .12s, opacity .2s; flex:0 0 auto; }
  #send:hover:not(:disabled){ background:var(--accent-2); }
  #send:disabled{ opacity:.35; cursor:default; }
  #send svg{ width:18px; height:18px; }
  /* busy = show a clickable STOP square instead of the send arrow */
  #send .stop-ic{ display:none; }
  #send.busy{ background:var(--down,#e2616a); opacity:1; cursor:pointer; }
  #send.busy:disabled{ opacity:1; cursor:pointer; }
  #send.busy .send-ic{ display:none; }
  #send.busy .stop-ic{ display:inline-flex; }

  /* indicator autocomplete dropdown */
  #acbox{ position:absolute; bottom:100%; left:10px; right:10px; margin-bottom:4px; background:var(--panel); border:1px solid var(--border); border-radius:var(--r); max-height:220px; overflow-y:auto; z-index:50; display:none; box-shadow:0 -8px 24px rgba(0,0,0,.5); }
  #acbox.show{ display:block; }
  .acitem{ padding:7px 12px; font-size:12px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-family:var(--mono); }
  .acitem .cat{ color:var(--text-3); font-size:10px; margin-left:6px; }
  .acitem.sel, .acitem:hover{ background:var(--accent-soft); }

  /* history modal */
  #histmodal{ display:none; position:fixed; inset:0; background:rgba(0,8,24,.66); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
  #histmodal.show{ display:flex; }
  #histcard{ background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r-lg); width:min(760px,92vw); max-height:82vh; display:flex; flex-direction:column; box-shadow:0 24px 70px rgba(0,0,0,.6); }
  #histhead{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); font-size:14px; font-weight:700; }
  #histclose{ background:var(--panel); color:var(--text-2); border:1px solid var(--border); border-radius:var(--r-sm); width:28px; height:28px; cursor:pointer; font-size:14px; }
  #histclose:hover{ border-color:var(--accent); color:var(--text); }
  #histlist{ overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
  .hrow{ border:1px solid var(--border-soft); border-radius:var(--r); padding:10px 12px; background:var(--panel); }
  .hrow .hq{ font-size:12px; color:var(--text); margin-bottom:5px; white-space:pre-wrap; }
  .hrow .hmeta{ font-size:10px; color:var(--text-3); display:flex; gap:10px; flex-wrap:wrap; margin-bottom:6px; font-family:var(--mono); }
  .hrow .hmeta .mdl{ color:var(--warn); }
  .hrow .ha{ font-size:11px; color:var(--text-2); max-height:0; overflow:hidden; transition:max-height .15s; }
  .hrow.open .ha{ max-height:600px; overflow-y:auto; margin-top:6px; }
  .hrow .hbtns{ display:flex; gap:6px; margin-top:8px; }
  .hrow button{ background:var(--panel-2); color:var(--text-2); border:1px solid var(--border); border-radius:var(--r-sm); padding:4px 10px; font:inherit; font-size:11px; cursor:pointer; }
  .hrow button.resume{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .hrow button.hdel{ margin-left:auto; color:#e2616a; }
  .hrow button.hdel:hover{ border-color:#e2616a; background:rgba(226,97,106,.12); }
  .hrow button:hover{ border-color:var(--accent); }
  #histlist .sys{ padding:16px; text-align:center; }

  /* ---- backtest modal ---- */
  #btmodal{ display:none; position:fixed; inset:0; background:rgba(0,8,24,.66); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(2px); }
  #btmodal.show{ display:flex; }
  #btcard{ background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r-lg); width:min(1040px,94vw); max-height:88vh; display:flex; flex-direction:column; box-shadow:0 24px 70px rgba(0,0,0,.6); }
  #bthead{ display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); font-size:14px; font-weight:700; }
  #btclose{ background:var(--panel); color:var(--text-2); border:1px solid var(--border); border-radius:var(--r-sm); width:28px; height:28px; cursor:pointer; font-size:14px; }
  #btclose:hover{ border-color:var(--accent); color:var(--text); }
  #btbody{ overflow-y:auto; padding:14px 16px; }
  .btcols{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .btsec{ margin-bottom:14px; }
  .btlabel{ font-size:11px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.4px; margin-bottom:7px; }
  .bthint{ font-weight:400; text-transform:none; letter-spacing:0; color:var(--text-3); }
  .condlist{ display:flex; flex-direction:column; gap:6px; margin-bottom:6px; }
  .cond{ display:flex; gap:5px; align-items:center; }
  .cond select, .cond input{ background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:var(--r-sm); padding:5px 6px; font:inherit; font-size:11px; min-width:0; }
  .cond .c-left{ flex:1 1 40%; }
  .cond .c-op{ flex:0 0 96px; }
  .cond .c-right{ flex:1 1 40%; }
  .cond .c-del{ flex:0 0 24px; background:var(--panel-2); color:#e2616a; border:1px solid var(--border); border-radius:var(--r-sm); cursor:pointer; padding:5px 0; }
  .cond .c-del:hover{ border-color:#e2616a; background:rgba(226,97,106,.12); }
  .addcond{ background:var(--panel-2); color:var(--text-2); border:1px dashed var(--border); border-radius:var(--r-sm); padding:5px 10px; font:inherit; font-size:11px; cursor:pointer; }
  .addcond:hover{ border-color:var(--accent); color:var(--text); }
  .pairchips{ display:flex; flex-wrap:wrap; gap:6px; max-height:96px; overflow-y:auto; }
  .pairchips .chip{ font-size:11px; padding:4px 9px; border:1px solid var(--border); border-radius:999px; background:var(--panel); color:var(--text-2); cursor:pointer; user-select:none; }
  .pairchips .chip.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
  #bt-strat{ width:100%; background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:var(--r-sm); padding:8px; font:inherit; font-size:13px; }
  .btgrid{ display:grid; grid-template-columns:1fr 1fr; gap:8px 12px; }
  .btgrid label{ display:flex; flex-direction:column; gap:3px; font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:.3px; }
  .btgrid input, .btgrid select{ background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:var(--r-sm); padding:6px; font:inherit; font-size:12px; }
  .btgrid label.ckl{ flex-direction:row; align-items:center; gap:6px; text-transform:none; letter-spacing:0; font-size:11px; color:var(--text-2); }
  .btgrid label.ckl input{ width:auto; }
  .btactions{ display:flex; align-items:center; gap:12px; margin-top:14px; }
  .bt-run{ background:var(--accent); color:#fff; border:none; border-radius:var(--r-sm); padding:9px 20px; font:inherit; font-weight:700; font-size:13px; cursor:pointer; }
  .bt-run:hover{ filter:brightness(1.08); }
  .bt-run:disabled{ opacity:.5; cursor:default; }
  .bt-status{ font-size:11px; color:var(--text-3); font-family:var(--mono); }
  .bt-status.err{ color:#e2616a; }
  .btresult{ margin-top:14px; border-top:1px solid var(--border); padding-top:12px; display:none; }
  .btresult.show{ display:block; }
  .btstats{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
  .btstat{ background:var(--panel); border:1px solid var(--border-soft); border-radius:var(--r); padding:8px 12px; min-width:96px; }
  .btstat .v{ font-size:16px; font-weight:700; color:var(--text); font-family:var(--mono); }
  .btstat .v.pos{ color:#3fb27f; } .btstat .v.neg{ color:#e2616a; }
  .btstat .k{ font-size:9px; color:var(--text-3); text-transform:uppercase; letter-spacing:.4px; margin-top:2px; }
  .bttrades{ max-height:240px; overflow-y:auto; border:1px solid var(--border-soft); border-radius:var(--r); }
  .bttrades table{ width:100%; border-collapse:collapse; font-size:11px; font-family:var(--mono); }
  .bttrades th{ position:sticky; top:0; background:var(--panel-2); color:var(--text-3); font-weight:600; text-align:left; padding:6px 8px; font-size:10px; }
  .bttrades td{ padding:5px 8px; border-top:1px solid var(--border-soft); color:var(--text-2); }
  .bttrades td.pos{ color:#3fb27f; } .bttrades td.neg{ color:#e2616a; }
  .btmark{ background:var(--panel-2); border:1px solid var(--border); border-radius:var(--r-sm); padding:6px 12px; font:inherit; font-size:11px; color:var(--text-2); cursor:pointer; margin-top:10px; }
  .btmark:hover{ border-color:var(--accent); color:var(--text); }
  /* past-backtests picker (Option B): pick which stored runs show on the chart */
  .btpast{ margin-top:14px; border-top:1px solid var(--border); padding-top:12px; }
  .btpast-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .btpast-head .t{ font-size:11px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.4px; }
  .btpast-clear{ background:transparent; border:1px solid var(--border); border-radius:var(--r-sm); color:var(--text-3); font:inherit; font-size:10px; padding:3px 8px; cursor:pointer; }
  .btpast-clear:hover{ border-color:var(--down); color:var(--down); }
  .btpast-list{ display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; }
  .btpast-row{ display:flex; align-items:center; gap:9px; padding:6px 8px; border:1px solid var(--border-soft); border-radius:var(--r-sm); background:var(--panel); font-size:11px; }
  .btpast-row input[type=checkbox]{ cursor:pointer; flex:0 0 auto; }
  .btpast-row .pdot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .btpast-row .plab{ color:var(--text); font-weight:600; white-space:nowrap; }
  .btpast-row .pmeta{ color:var(--text-3); flex:1 1 auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .btpast-row .pgo{ background:transparent; border:none; color:var(--text-3); cursor:pointer; font-size:12px; padding:1px 5px; border-radius:3px; }
  .btpast-row .pgo:hover{ background:var(--border-soft); color:var(--accent); }
  .btpast-row .px{ background:transparent; border:none; color:var(--text-3); cursor:pointer; font-size:12px; padding:1px 5px; border-radius:3px; }
  .btpast-row .px:hover{ color:var(--down); }
  .btpast-empty{ color:var(--text-3); font-size:11px; }
  @media(max-width:820px){ .btcols{ grid-template-columns:1fr; } }

  /* scrollbars */
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:var(--panel-2); border-radius:6px; border:2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover{ background:var(--border); }
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <div id="toolbar">
      <select class="tb-sel" id="tfsel" title="timeframe (resampled from 15m base)">
        <option value="15m">15m</option>
        <option value="30m">30m</option>
        <option value="1h">1h</option>
        <option value="2h">2h</option>
        <option value="4h">4h</option>
        <option value="6h">6h</option>
        <option value="8h">8h</option>
        <option value="12h">12h</option>
        <option value="1d">1D</option>
      </select>
      <span class="tb-div"></span>
      <button class="tb-ico" id="legendtoggle" title="show/hide chart legend">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18l4-7 4 4 4-9 4 6"/></svg>
      </button>
      <div class="tb-candle" id="candlewrap">
        <button class="tb-ico" id="pricetoggle" title="show/hide candles">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 4v4M7 16v4M17 4v3M17 17v3"/><rect x="4.5" y="8" width="5" height="8" rx="1"/><rect x="14.5" y="7" width="5" height="10" rx="1"/></svg>
        </button>
        <button class="tb-caret" id="candlemenu" title="candle type"><span class="caret-s">▾</span></button>
        <div class="candle-pop" id="candlepop">
          <button class="cp-item active" data-ct="candles">Candles</button>
          <button class="cp-item" data-ct="heikin">Heikin-Ashi</button>
          <button class="cp-item" data-ct="line">Line</button>
          <button class="cp-item" data-ct="hidden">Hide candles</button>
        </div>
      </div>
      <span class="tb-div"></span>
      <button class="tb-text" id="indopen" title="add indicators to the chart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9v8M5 12h2.5M5 17h2.5"/><path d="M11.5 5v11M11.5 7h2.5M11.5 13h2.5"/><path d="M18 8v9M18 10h2.5M18 16h2.5" transform="translate(-1.5)"/><path d="M2 6c2 1.5 3.5 1 5.5-1S11 1.5 13 3.5 16.5 7 20 5"/></svg>
        Indicators <span class="caret-s">▾</span>
      </button>
      <button class="tb-text" id="histbtn" title="past sessions">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>
        History
      </button>
      <button class="tb-text" id="btbtn" title="build &amp; run a backtest">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16l3-4 3 2 4-6"/></svg>
        Backtest
      </button>
      <select id="pair" title="pair"></select>
      <span id="stratgroup" class="stratgroup">
        <select id="stratsel" title="strategy (which indicator set to load)"></select>
        <button class="tb-ico stratbtn" id="stratgear" title="edit / delete this strategy's dump">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="tb-ico stratbtn" id="stratadd" title="add a strategy (generate its indicator dump)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        </button>
      </span>
      <span class="tb-sp"></span>
      <button class="tb-ico" id="resetzoom" title="reset zoom (fit all)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      </button>
      <button class="tb-ico" id="reload" title="reload data">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
      </button>
      <span class="tb-div"></span>
      <button class="tb-ico" id="snapbtn" title="screenshot chart">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l1.5-2h7L18 8h2a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.2"/></svg>
      </button>
    </div>
    <div id="chartwrap">
      <div id="leftrail">
        <button class="rail measure-off active" data-tool="cursor" title="cursor / crosshair">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 3v6M12 15v6M3 12h6M15 12h6"/></svg>
        </button>
        <button class="rail" id="measurebtn" title="measure tool: click two points">
          <svg viewBox="0 0 122.88 122.88" fill="currentColor"><path d="M0.92,32.82l31.9-31.9C33.44,0.3,34.24,0,35.05,0c0.8,0,1.61,0.3,2.22,0.92l84.69,84.69c0.61,0.61,0.92,1.42,0.92,2.23 c0,0.8-0.31,1.6-0.92,2.21l-0.01,0.01l0.01,0.01l-31.9,31.9c-0.62,0.62-1.42,0.92-2.23,0.92c-0.8,0-1.61-0.3-2.23-0.92L0.92,37.27 C0.3,36.65,0,35.84,0,35.05C0,34.24,0.3,33.44,0.92,32.82L0.92,32.82z M105.32,77.15L90.84,91.63c-1.13,1.13-2.84,1.26-3.81,0.29 c-0.97-0.97-0.84-2.68,0.29-3.81l14.48-14.48L90.12,61.94l-6.86,6.85c-1.13,1.13-2.84,1.26-3.81,0.29 c-0.97-0.97-0.84-2.68,0.29-3.81l6.86-6.86L75.88,47.71L61.4,62.19c-1.13,1.13-2.84,1.26-3.81,0.29c-0.97-0.97-0.84-2.68,0.29-3.81 l14.48-14.48L61.09,32.91l-6.86,6.85c-1.13,1.13-2.84,1.26-3.81,0.29c-0.97-0.97-0.84-2.68,0.29-3.81l6.86-6.86L46.43,18.26 L31.95,32.74c-1.13,1.13-2.83,1.25-3.8,0.29c-0.97-0.97-0.84-2.67,0.29-3.8l14.48-14.48l-7.87-7.87L6.87,35.05l80.96,80.96 l28.17-28.17C102.8,74.62,118.53,90.36,105.32,77.15L105.32,77.15z"/></svg>
        </button>
        <div class="drawgroup">
          <button class="rail" id="drawbtn" title="drawing tools">
            <svg id="drawbtnico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </button>
          <div class="drawflyout" id="drawflyout">
            <button class="rail" id="drawpenbtn" data-draw="drawopenpath" title="freehand pen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>

            </button>
            <button class="rail" id="drawarrowbtn" data-draw="arrow" title="arrow">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19L19 5"/><path d="M11 5h8v8"/></svg>
            </button>
            <button class="rail" id="drawrectbtn" data-draw="drawrect" title="rectangle / zone">

            </button>
            <button class="rail" id="drawcirclebtn" data-draw="drawcircle" title="circle / ellipse">

          </div>
        </div>
        <div class="drawgroup">
          <button class="rail" id="erasergroupbtn" title="erase tools">

          </button>
          <div class="drawflyout" id="eraseflyout">
            <button class="rail" id="erasebtn" data-draw="eraseshape" title="erase: click a drawing to remove it">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 21h10M5 13l6-6 7 7-5 5H8z"/><path d="M11 7l7 7"/></svg>
            </button>
            <button class="rail" id="cleardrawbtn" title="clear all drawings">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6l3 14h12l3-14M4 6h16"/><path d="M9.5 6V4h5v2"/><path d="M9 10l6 6M15 10l-6 6"/></svg>
            </button>
          </div>
        </div>
        <button class="rail" id="zoomrail" title="reset zoom">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M16 16l4 4M9 11h4M11 9v4"/></svg>
        </button>
        <div class="drawgroup" id="crosshairgroup">
          <button class="rail active" id="rulerrail" title="crosshair options: ruler line + hover readout">

              <span class="ch-lab">Hover readout</span>

        </div>
        <button class="rail" id="eyerail" title="show/hide candles">

        <button class="rail" id="lockrail" title="lock / unlock price scale (y mode)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
        </button>
        <span class="rail-sp"></span>
        <button class="rail" id="trashrail" title="clear all indicators">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg>
        </button>
      </div>
      <div id="chartcol">
        <div id="charthead">
          <div class="chh-row chh-main">
            <span class="chh-pair" id="chhPair">—</span>
            <span class="chh-tf" id="chhTf">15m</span>
            <span class="ohlc"><b>O</b> <i id="chhO">—</i></span>
            <span class="ohlc"><b>L</b> <i id="chhL">—</i></span>
            <span class="ohlc"><b>H</b> <i id="chhH">—</i></span>
            <span class="ohlc"><b>C</b> <i id="chhC">—</i></span>
          </div>
          <div class="chh-row chh-vol">
            <span class="chh-lbl">Volume</span>
            <span class="chh-v up" id="chhVup">—</span>
            <span class="chh-v" id="chhVmid">—</span>
            <span class="chh-v down" id="chhVdn">—</span>
          </div>
        </div>
        <div id="chart"></div>
        <div id="plotstatus" title="pair and bars in view"></div>
        <div id="overlaybar"></div>
        <button id="ymodebtn" title="cycle y-axis: auto / manual / log">Y-A</button>
        <div id="yzone" title="drag up = zoom out, down = zoom in (price axis only)"><span class="yhint">↕ price zoom</span></div>
        <div id="subsplit" title="drag to resize the bottom subplot pane"><span class="sshint"></span></div>
      </div>
    </div>
  </div>
  <div id="splitter"></div>
  <div id="right">
    <button id="rightcollapse" title="collapse panel">

<script>
const API = "";

/* ---- AI connectivity light: dot is lit only when the brain is alive and ready ---- */
(function(){
  const dot=document.getElementById("conndot");
  if(!dot) return;
  async function poll(){
    try{
      const r=await fetch(API+"/api/brain/status",{cache:"no-store"});
      const s=await r.json();
      if(s.connected){
        dot.classList.add("connected"); dot.classList.remove("offline");
        dot.title = s.busy ? "connected — AI is working…" : "connected to AI — ready";
      }else{
        dot.classList.remove("connected"); dot.classList.add("offline");
        dot.title = "AI offline — brain not responding";
      }
    }catch(e){
      dot.classList.remove("connected"); dot.classList.add("offline");
      dot.title = "server unreachable";
    }
  }
  poll();
  setInterval(poll, 2500);
})();
let DATA = null;
let COLS = {ohlcv:[], indicators:[]};
let RANGES = {};             // name -> {bucket,min,max}
let CUR_PAIR = null;
let CUR_STRAT = null;        // which strategy's indicator dump is loaded
let FULL_RANGE = null;
let CUR_RANGE = null;
const MAX_POINTS_CAP = 12000;   // hard ceiling so high-res TFs stay plottable
let AUTOSCALE = true;        // back-compat flag (true when YMODE==="auto")
let YMODE = "auto";          // "auto" | "manual" | "log"
let SHOW_LEGEND = (localStorage.getItem("cs_legend")==="1");   // chart legend visibility (default off)
let SHOW_PRICE = true;       // OHLC candlestick visibility (persists across slice reloads)
let RULER = (localStorage.getItem("cs_ruler")!=="0"); // ruler crosshair spike on hover (default on)
let HOVER = (localStorage.getItem("cs_hover")!=="0"); // per-point hover tooltips (price+time). off = clean view for panning
// vertical split: paper-y where the price pane bottom / subplot stack top meet.
// Dragging #subsplit changes it so the user can grow/shrink the bottom subplots.
let SUBPLOT_SPLIT = (()=>{ const v=parseFloat(localStorage.getItem("cs_subsplit")); return (v>=0.15 && v<=0.85) ? v : 0.435; })();
let MEASURE = false;         // measure-tool armed
let MEASURE_A = null;        // first clicked point {x, y}
let DRAW_MODE = null;        // null=pan | "drawopenpath"|"drawline"|"drawrect"|"eraseshape" — Plotly dragmode for drawing
const DRAW_COLOR = "#22d3ee";// accent for user drawings (visible in the AI screenshot)
const AI_DRAW_COLOR = "#f59e0b";// amber accent for AI callout drawings (distinct from user cyan)
const PAD_FRAC = 0.18;       // fetch this much extra data outside the view on each side
let TF = "15m";              // selected display timeframe (resampled client-side from 15m base)
let CANDLE_TYPE = "candles"; // "candles" | "heikin" | "hidden"
const BASE_TF_MIN = 15;      // raw dump granularity (minutes)
const TF_MIN = {"15m":15,"30m":30,"1h":60,"2h":120,"4h":240,"6h":360,"8h":480,"12h":720,"1d":1440};

// ACTIVE: name -> {place:"overlay"|"sub:N", color:"#rrggbb"}
const ACTIVE = new Map();
let MARKERS = [];            // [{date, price, confirmed}] event markers from analysis
let MARKER_LABEL = "";       // legend label for current markers
let MARKER_GROUPS = [];      // [{label, markers:[...], color}] — REBUILT from OVERLAYS by syncOverlays()
// ---- overlay registry: every "thing plotted on the chart" with provenance ----
// each: {id, kind:"backtest"|"analysis", label, meta, pair, range:[start,end]|null,
//        markers:[...], visible:true, color}
let OVERLAYS = [];
let _ovId = 0;
const OV_COLORS = ["#7ee787","#79c0ff","#d2a8ff","#ffa657","#f778ba","#56d4dd"];
function ovNextColor(){ return OV_COLORS[OVERLAYS.length % OV_COLORS.length]; }
function addOverlay(o){
  const ov = Object.assign({ id:++_ovId, visible:true, color:ovNextColor(), range:null, meta:"" }, o);
  OVERLAYS.push(ov);
  syncOverlays();
  saveOverlays();
  return ov;
}
function removeOverlay(id){ OVERLAYS = OVERLAYS.filter(o=>o.id!==id); syncOverlays(); saveOverlays(); }
function toggleOverlay(id){ const o=OVERLAYS.find(x=>x.id===id); if(o){ o.visible=!o.visible; syncOverlays(); saveOverlays(); } }
function clearOverlays(){ OVERLAYS=[]; syncOverlays(); saveOverlays(); }
// ---- persistence: backtest overlays survive reload (analysis marks are transient) ----
const OV_STORE_KEY="cs_overlays_v1";
function saveOverlays(){
  try{
    const keep=OVERLAYS.filter(o=>o.kind==="backtest").map(o=>({
      id:o.id, kind:o.kind, label:o.label, meta:o.meta, pair:o.pair,
      range:o.range, markers:o.markers, visible:o.visible, color:o.color,
      _runKey:o._runKey, _ts:o._ts,
    }));
    localStorage.setItem(OV_STORE_KEY, JSON.stringify(keep));
  }catch(e){}
}
function loadOverlays(){
  try{
    const raw=localStorage.getItem(OV_STORE_KEY); if(!raw) return;
    const arr=JSON.parse(raw); if(!Array.isArray(arr)) return;
    OVERLAYS = arr.filter(o=>o&&o.markers&&o.markers.length);
    _ovId = OVERLAYS.reduce((m,o)=>Math.max(m, o.id||0), 0);
  }catch(e){ OVERLAYS=[]; }
}
// rebuild MARKER_GROUPS from visible overlays (for current pair) + redraw chart + chips
function syncOverlays(){
  const cur = (CUR_PAIR||"");
  MARKER_GROUPS = OVERLAYS.filter(o=>o.visible && (!o.pair || o.pair===cur))
    .map(o=>({label:o.label, markers:o.markers, color:o.color}));
  if(typeof render==="function") render(true);
  renderOverlayBar();
}
function renderOverlayBar(){
  const bar=document.getElementById("overlaybar"); if(!bar) return;
  bar.innerHTML="";
  if(!OVERLAYS.length) return;
  const lbl=document.createElement("span"); lbl.className="ovbar-lbl"; lbl.textContent="on chart";
  bar.appendChild(lbl);
  OVERLAYS.forEach(o=>{
    const offPair = o.pair && o.pair!==(CUR_PAIR||"");
    const chip=document.createElement("div");
    chip.className="ovchip"+(o.visible?"":" off");
    chip.style.borderLeftColor=o.color;
    chip.title = o.visible ? "click: zoom to range  ·  eye: hide  ·  ✕: remove"
                           : "hidden — click eye to show";
    const meta = o.meta + (offPair ? "  · other pair" : "");
    chip.innerHTML='<span class="ovdot" style="background:'+o.color+'"></span>'+
      '<span class="ovlab">'+escHtml(o.label)+'</span>'+
      (meta?'<span class="ovmeta">'+escHtml(meta)+'</span>':'')+
      '<button class="ovtog" title="'+(o.visible?"hide":"show")+'">'+(o.visible?"👁":"🚫")+'</button>'+
      '<button class="ovx" title="remove">✕</button>';
    chip.querySelector(".ovtog").onclick=(e)=>{ e.stopPropagation(); toggleOverlay(o.id); };
    chip.querySelector(".ovx").onclick=(e)=>{ e.stopPropagation(); removeOverlay(o.id); };
    // clicking the chip body: show if hidden, then jump to its pair/range
    chip.onclick=(e)=>{ if(e.target.closest("button")) return;
      if(!o.visible){ toggleOverlay(o.id); }
      if(offPair){ loadData(o.pair).then(()=>{ if(o.range) jumpRange(o.range[0],o.range[1]); syncOverlays(); }); }
      else if(o.range){ jumpRange(o.range[0],o.range[1]); }
    };
    bar.appendChild(chip);
  });
  // overlay strip changes the chart column height; let Plotly re-fit.
  try{ if(window.Plotly&&gd&&gd.data) Plotly.Plots.resize(gd); }catch(e){}
}
function escHtml(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// zoom chart x-axis to [start,end] ISO/date strings and reload that slice
function jumpRange(start,end){
  if(!start&&!end) return;
  const s=start?new Date(start).toISOString():null, e=end?new Date(end).toISOString():null;
  if(s&&e){ Plotly.relayout(gd, {"xaxis.range":[s,e]}); }
  reloadSlice(s,e);
}
const FAVS = new Set(JSON.parse(localStorage.getItem("cs_favs")||"[]"));
let PRESETS = JSON.parse(localStorage.getItem("cs_presets")||"{}");
let CUR_PRESET = "";   // name of the currently-applied preset (for /clear)

const PALETTE = ["#58a6ff","#e3b341","#7ee787","#ff7b72","#d2a8ff","#ffa657","#79c0ff","#56d364","#f778ba","#a5d6ff","#ffdf5d","#bc8cff"];
let colorIdx=0;
function nextColor(){ const c=PALETTE[colorIdx%PALETTE.length]; colorIdx++; return c; }

const gd = document.getElementById("chart");
const logEl = document.getElementById("log");

function addMsg(text, cls){
  const d=document.createElement("div"); d.className="msg "+cls;
  if(cls==="bot"){ d.innerHTML=mdRender(text); }
  else { d.textContent=text; }
  logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight; return d;
}
function mdRender(t){
  try {
    let h = marked.parse(t||"", {breaks:true, gfm:true});
    // wrap tables so wide ones scroll horizontally instead of crushing labels
    h = h.replace(/<table>/g,'<div class="tblwrap"><table>').replace(/<\/table>/g,'</table></div>');
    return h;
  }
  catch(e){ const e2=document.createElement("div"); e2.textContent=t||""; return e2.innerHTML; }
}
function setBot(el, text, model, elapsedMs){
  let html = mdRender(text||"(no reply)");
  if(model || elapsedMs!=null){
    let body = "";
    if(model) body += 'model <span class="mdl">'+model+'</span>';
    if(elapsedMs!=null){ if(body) body+=' &nbsp;&middot;&nbsp; '; body += 'took <span class="mdl">'+fmtDur2(elapsedMs)+'</span>'; }
    html += '<details class="meta"><summary>details</summary><div class="mbody">'+body+'</div></details>';
  }
  el.innerHTML = html;
  logEl.scrollTop=logEl.scrollHeight;
}
// Stream the final reply out with a typewriter animation, then finish with the
// fully-rendered markdown + the details footer. Returns a promise that resolves
// when the animation completes. Skips animation for very long replies (jumps to
// the end) so big tables don't take forever.
function streamBot(el, text, model, elapsedMs){
  return new Promise(resolve=>{
    const full=(text||"(no reply)");
    let finished=false;
    const finish=()=>{ if(finished) return; finished=true;
      const t=_streamTimers.get(el); if(t){ clearTimeout(t); _streamTimers.delete(el); }
      _streamFinish.delete(el); el.classList.remove("streaming");
      setBot(el, full, model, elapsedMs); resolve(); };
    _streamFinish.set(el, finish);   // let cancelStream snap to the end
    // Don't typewriter through markdown tables/code blocks or huge replies —
    // those look broken mid-render. Just render them immediately.
    if(full.length>1400 || /\n\s*\|/.test(full) || full.includes("```")){ finish(); return; }
    el.classList.add("bot","streaming");
    // stream by word for a natural, fast cadence
    const tokens=full.match(/\S+\s*/g) || [full];
    let i=0, shown="";
    const stick= logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 60;
    const tick=()=>{
      // reveal a few tokens per frame so longer replies still feel snappy
      const burst=Math.max(1, Math.round(tokens.length/120));
      for(let k=0;k<burst && i<tokens.length;k++){ shown+=tokens[i++]; }
      el.innerHTML=mdRender(shown);
      if(stick) logEl.scrollTop=logEl.scrollHeight;
      if(i<tokens.length){ _streamTimers.set(el, setTimeout(tick, 16)); }
      else finish();
    };
    tick();
  });
}
const _streamTimers=new WeakMap();
const _streamFinish=new WeakMap();
function cancelStream(el){ const f=_streamFinish.get(el); if(f) f(); }
function fmtDur2(ms){
  if(ms==null) return "";
  if(ms<1000) return Math.round(ms)+"ms";
  const s=ms/1000;
  if(s<60) return (s<10?s.toFixed(1):Math.round(s))+"s";
  const m=Math.floor(s/60), rem=Math.round(s-m*60);
  return m+"m "+rem+"s";
}
function setStatus(t){
  const el=document.getElementById("plotstatus");
  if(el){ el.textContent=t; positionPlotStatus(); }
}
/* Pin the pair/bars label to the bottom-left of the MAIN plot, just above its
   x-axis (above any subplots). Reads the price y-axis domain bottom from the
   current Plotly layout so it tracks the subplot split as it is dragged. */
function positionPlotStatus(){
  const el=document.getElementById("plotstatus");
  if(!el || !gd || !gd._fullLayout) return;
  const fl=gd._fullLayout;
  // bottom of the price pane in paper coords (0=bottom,1=top); fall back to 0.
  let yBot=0;
  try{ yBot=(fl.yaxis && fl.yaxis.domain) ? fl.yaxis.domain[0] : 0; }catch(e){}
  const H=gd.clientHeight||gd.getBoundingClientRect().height||0;
  const bottomMargin=(fl.margin && fl.margin.b)||0;
  // pixels from container bottom = pane-bottom fraction * height + plot bottom margin
  el.style.bottom=(yBot*H + bottomMargin + 4)+"px";
}
function saveFavs(){ localStorage.setItem("cs_favs", JSON.stringify([...FAVS])); }
function savePresets(){ localStorage.setItem("cs_presets", JSON.stringify(PRESETS)); }

  try{
    const j=await fetch(API+"/api/dump_strategies").then(r=>r.json());

function stratModalEl(id){ return document.getElementById(id); }

  nameSel.disabled = (mode==="edit");

function closeStratModal(){
  if(STRAT_POLL){ clearInterval(STRAT_POLL); STRAT_POLL=null; }
  stratModalEl("stratmodal").classList.remove("open");
}

function selectedStratPairs(){
  return Array.from(document.querySelectorAll("#strat-pairs input:checked")).map(c=>c.value);
}

async function runStratDump(){
  const strategy=stratModalEl("strat-name").value;
  const pairs=selectedStratPairs();
  const timerange=stratModalEl("strat-tr").value.trim();
  const errEl=stratModalEl("strat-err"); errEl.textContent="";
  if(!strategy){ errEl.textContent="pick a strategy"; return; }
  if(!pairs.length){ errEl.textContent="select at least one pair"; return; }
  if(timerange && !/^\d{0,8}-\d{0,8}$/.test(timerange)){ errEl.textContent="timerange must look like 20240101-20250501"; return; }
  stratModalEl("strat-run").disabled=true;
  const body={strategy, pairs, timerange: timerange||null};
  let res;
  try{
    res=await fetch(API+"/api/dump_jobs",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(r=>r.json());
  }catch(e){ errEl.textContent="request failed"; stratModalEl("strat-run").disabled=false; return; }
  if(!res.ok){ errEl.textContent=res.error||"failed to start"; stratModalEl("strat-run").disabled=false; return; }
  // show progress, poll
  stratModalEl("strat-prog").classList.add("show");
  stratModalEl("strat-pfill").style.width="0%";
  stratModalEl("strat-pphase").textContent="starting…";
  stratModalEl("strat-pcount").textContent="";
  stratModalEl("strat-plog").textContent="";
  pollStratJob(res.job_id, strategy);
}

function pollStratJob(jobId, strategy){
  if(STRAT_POLL) clearInterval(STRAT_POLL);
  STRAT_POLL=setInterval(async()=>{
    let s;
    try{ s=await fetch(API+"/api/dump_jobs/"+jobId).then(r=>r.json()); }catch(e){ return; }
    const done=s.done||0, total=s.total||1;
    const pct=Math.max(2, Math.round((done/total)*100));
    stratModalEl("strat-pfill").style.width=pct+"%";
    stratModalEl("strat-pphase").textContent=s.phase||s.status||"";
    stratModalEl("strat-pcount").textContent=done+" / "+total+" pairs";
    if(s.log){ const l=stratModalEl("strat-plog"); l.textContent=s.log; l.scrollTop=l.scrollHeight; }
    if(s.status==="done"){
      clearInterval(STRAT_POLL); STRAT_POLL=null;
      stratModalEl("strat-pfill").style.width="100%";
      stratModalEl("strat-pphase").textContent="done ✓";
      // refresh dropdown, select the new strategy, reload chart
      await loadDumpStrategies();
      const sel=document.getElementById("stratsel");
      if([...sel.options].some(o=>o.value===strategy)){ sel.value=strategy; CUR_STRAT=strategy; }
      loadData(CUR_PAIR);
      setTimeout(closeStratModal, 700);
    } else if(s.status==="error"){
      clearInterval(STRAT_POLL); STRAT_POLL=null;
      stratModalEl("strat-err").textContent=s.error||"dump failed";
      stratModalEl("strat-run").disabled=false;
    }
  }, 1200);
}

async function deleteStratDump(){
  const name=STRAT_EDIT_NAME; if(!name) return;
  if(!confirm("Delete the indicator dump for \""+name+"\"? This removes its CSVs from disk.")) return;
  const errEl=stratModalEl("strat-err"); errEl.textContent="";
  let res;
  try{ res=await fetch(API+"/api/dump_strategies/"+encodeURIComponent(name),{method:"DELETE"}).then(r=>r.json()); }
  catch(e){ errEl.textContent="request failed"; return; }
  if(!res.ok){ errEl.textContent=res.error||"delete failed"; return; }
  await loadDumpStrategies();
  // if the deleted one was loaded, switch to whatever's current
  const sel=document.getElementById("stratsel");
  CUR_STRAT = sel.value || null;
  loadData(CUR_PAIR);
  closeStratModal();
}

function wireStratModal(){
  const add=document.getElementById("stratadd");

/* ---------------- categorization ---------------- */
const CATS = [
  ["MATRIX",   ["matrix"]],
  ["ROXY/RPXY",["roxy","rpxy","rxy"]],
  ["Moving Avg",["ema","wma","sma","smma","kama","zlema","hma","tema","dema","_ma"]],
  ["MID LINE", ["mid_line","midline"]],
  ["Bands",    ["band","upper","lower","support","resist"]],
  ["Momentum", ["rsi","macd","stoch","cci","mom","adx","atr","vfi","cmf","obv","mfi","willr"]],
  ["Trend/Regime",["trend","regime","range","curios","f1","mln","green","red","dip","htf"]],
  ["Other",    []],
];
function catOf(name){
  const lo=name.toLowerCase();
  for(const [cat,keys] of CATS){ if(keys.length===0) continue; if(keys.some(k=>lo.includes(k))) return cat; }
  return "Other";
}
const COLLAPSED = new Set();
let FAV_ONLY=false;

/* modal tab: which group of indicators is shown ("fav" | "main" | "sub") */
let IND_TAB = "main";
function tabOf(name){ return (RANGES[name]||{}).bucket==="price" ? "main" : "sub"; }
function indInTab(name){
  if(IND_TAB==="fav") return FAVS.has(name);
  return tabOf(name)===IND_TAB;
}
function updateTabCounts(){
  let f=0,m=0,s=0;
  COLS.indicators.forEach(n=>{ if(FAVS.has(n))f++; if(tabOf(n)==="main")m++; else s++; });
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
  set("tabcount-fav",f); set("tabcount-main",m); set("tabcount-sub",s);
}

/* default placement for a freshly-shown indicator, by value bucket */
function defaultPlace(name){
  const b=(RANGES[name]||{}).bucket;
  if(b==="price") return "overlay";
  if(b==="0-100") return "sub:0";
  if(b==="0-1")   return "sub:1";
  return "sub:2";  // other
}

function buildIndPanel(){
  const list=document.getElementById("indlist"); if(!list) return;
  const q=document.getElementById("indsearch").value.trim().toLowerCase();
  document.getElementById("indcount").textContent=
    COLS.indicators.length+" total"+(FAVS.size?(" · "+FAVS.size+"★"):"")+(ACTIVE.size?(" · "+ACTIVE.size+" shown"):"");
  updateTabCounts();
  const groups={}; CATS.forEach(([c])=>groups[c]=[]);
  COLS.indicators.forEach(n=>{
    if(!indInTab(n)) return;
    if(q && !n.toLowerCase().includes(q)) return;
    groups[catOf(n)].push(n);
  });
  // Build the whole panel as one HTML string, then assign once. Much faster than
  // per-chip createElement + per-node closures when there are 150+ indicators.
  const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  let html="";
  CATS.forEach(([cat])=>{
    const items=groups[cat]; if(!items.length) return;
    const collapsed=COLLAPSED.has(cat);
    html+='<div class="cat'+(collapsed?" collapsed":"")+'">'+
      '<div class="cat-h" data-cat="'+esc(cat)+'"><span class="arrow">▼</span>'+esc(cat)+' <span style="opacity:.6">('+items.length+')</span></div>'+
      '<div class="chips">';
    items.forEach(name=>{
      const on=ACTIVE.has(name)?" on":"", fav=FAVS.has(name)?" fav":"";
      html+='<div class="tchip'+on+'" data-name="'+esc(name)+'">'+
        '<span class="star'+fav+'" data-star="'+esc(name)+'" title="favorite">★</span>'+
        '<span>'+esc(name)+'</span></div>';
    });
    html+='</div></div>';
  });
  if(!html){
    html='<div id="indempty">'+(IND_TAB==="fav"
      ? "No favorites yet — tap ★ on any indicator to pin it here."
      : (q ? ("No match for \""+esc(q)+"\".") : "Nothing in this group."))+'</div>';
  }
  list.innerHTML=html;
}
// Delegated handlers (bound once) so rebuilding innerHTML stays cheap.
(function(){
  const list=document.getElementById("indlist"); if(!list || list._deleg) return; list._deleg=true;
  list.addEventListener("click",(e)=>{
    const star=e.target.closest(".star");
    if(star){ e.stopPropagation(); const name=star.dataset.star;

  });
})();
