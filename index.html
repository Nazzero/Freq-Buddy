/* Unified per-indicator popup: color + line width + opacity, anchored to the
   swatch. Replaces the old separate native color input and gear expander so all
   line styling lives in one place. */
let _cpopCfg=null, _cpopName=null, _cpopSw=null;
function openColorPop(anchor, cfg, name){
  const pop=document.getElementById("cpop");
  if(_cpopSw===anchor && pop.classList.contains("show")){ closeColorPop(); return; }
  _cpopCfg=cfg; _cpopName=name; _cpopSw=anchor;
  const cc=document.getElementById("cpopColor");
  const wr=document.getElementById("cpopWidth"), wv=document.getElementById("cpopWidthV");
  const or=document.getElementById("cpopOpacity"), ov=document.getElementById("cpopOpacityV");
  cc.value=cfg.color || "#79c0ff";
  const w = cfg.width!=null ? cfg.width : 1.3;
  const op = cfg.opacity!=null ? cfg.opacity : 1;
  wr.value=w; wv.textContent=w.toFixed(1);
  or.value=op; ov.textContent=Math.round(op*100)+"%";
  cc.oninput=()=>{ cfg.color=cc.value; if(_cpopSw) _cpopSw.style.background=cc.value; render(true); };
  wr.oninput=()=>{ const v=parseFloat(wr.value); wv.textContent=v.toFixed(1); cfg.width=v; render(true); };
  or.oninput=()=>{ const v=parseFloat(or.value); ov.textContent=Math.round(v*100)+"%"; cfg.opacity=v; render(true); };
  // ± buttons nudge the slider by 5x its native step, clamped to min/max
  const bump=(rng,dir)=>{
    const step=parseFloat(rng.step)*5, min=parseFloat(rng.min), max=parseFloat(rng.max);
    let v=parseFloat(rng.value)+dir*step;
    v=Math.min(max, Math.max(min, Math.round(v/step)*step));
    rng.value=v; rng.dispatchEvent(new Event("input"));
  };
  document.getElementById("cpopWidthDn").onclick=()=>bump(wr,-1);
  document.getElementById("cpopWidthUp").onclick=()=>bump(wr, 1);
  document.getElementById("cpopOpacityDn").onclick=()=>bump(or,-1);
  document.getElementById("cpopOpacityUp").onclick=()=>bump(or, 1);
  // position next to the swatch, clamped to the viewport
  pop.classList.add("show");
  const r=anchor.getBoundingClientRect();
  const pw=pop.offsetWidth, ph=pop.offsetHeight;
  let left=r.left, top=r.bottom+6;
  if(left+pw > window.innerWidth-8) left=window.innerWidth-8-pw;
  if(top+ph > window.innerHeight-8) top=r.top-6-ph;
  pop.style.left=Math.max(8,left)+"px";
  pop.style.top=Math.max(8,top)+"px";
}
function closeColorPop(){
  const pop=document.getElementById("cpop");
  pop.classList.remove("show");
  _cpopCfg=null; _cpopName=null; _cpopSw=null;
}
document.addEventListener("click",(e)=>{
  const pop=document.getElementById("cpop");
  if(!pop.classList.contains("show")) return;
  if(pop.contains(e.target)) return;
  if(e.target.closest && e.target.closest(".swatch")) return; // swatch handles its own toggle
  closeColorPop();
});
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape") closeColorPop(); });
window.addEventListener("resize", closeColorPop);

function toggleIndicator(name){
  if(ACTIVE.has(name)) ACTIVE.delete(name);
  else ACTIVE.set(name, {place:defaultPlace(name), color:nextColor()});
  render(true); buildActive(); buildIndPanel();
}

/* ---------------- timeframe resample + heikin-ashi (client-side) ---------- */
// DATA is 15m base. Build the view series at the selected TF and candle type.
// Resample: bucket consecutive base bars by floor(time / tfMs). OHLC aggregation
// = open(first) high(max) low(min) close(last) volume(sum); indicators last-in-bucket.
function viewData(){
  if(!DATA) return null;
  const tfm = TF_MIN[TF] || BASE_TF_MIN;
  let V = DATA;
  if(tfm > BASE_TF_MIN){
    const tfMs = tfm*60*1000;
    const idx={}, order=[];      // bucket -> row index into output
    const n=DATA.date.length;
    const cols=Object.keys(DATA).filter(k=>!k.startsWith("_"));
    const out={}; cols.forEach(c=>out[c]=[]);
    for(let i=0;i<n;i++){
      const t=new Date(DATA.date[i]).getTime();
      const b=Math.floor(t/tfMs);
      let j=idx[b];
      if(j==null){ j=order.length; idx[b]=j; order.push(b);
        // start new bucket
        for(const c of cols) out[c].push(DATA[c][i]);
        out.date[j]=new Date(b*tfMs).toISOString().slice(0,19);
        out.open[j]=DATA.open[i];
      } else {
        out.high[j]=Math.max(out.high[j], DATA.high[i]);
        out.low[j] =Math.min(out.low[j],  DATA.low[i]);
        out.close[j]=DATA.close[i];
        if(DATA.volume) out.volume[j]=(out.volume[j]||0)+(DATA.volume[i]||0);
        // indicators: last-in-bucket
        for(const c of cols){ if(["date","open","high","low","close","volume"].includes(c)) continue; out[c][j]=DATA[c][i]; }
      }
    }
    V=out;
  }
  if(CANDLE_TYPE==="heikin"){
    V=heikinAshi(V);
  }
  return V;
}
// Heikin-Ashi: HA_close=(o+h+l+c)/4; HA_open=(prevHAopen+prevHAclose)/2;
// HA_high=max(h,HAo,HAc); HA_low=min(l,HAo,HAc). Returns a shallow clone with
// open/high/low/close overwritten; indicators untouched.
function heikinAshi(V){
  const n=V.close.length; if(!n) return V;
  const o=new Array(n), h=new Array(n), l=new Array(n), c=new Array(n);
  let pho=null, phc=null;
  for(let i=0;i<n;i++){
    const O=V.open[i],H=V.high[i],L=V.low[i],C=V.close[i];
    const hc=(O+H+L+C)/4;
    const ho=(pho==null)?((O+C)/2):((pho+phc)/2);
    c[i]=hc; o[i]=ho; h[i]=Math.max(H,ho,hc); l[i]=Math.min(L,ho,hc);
    pho=ho; phc=hc;
  }
  const out=Object.assign({},V); out.open=o; out.high=h; out.low=l; out.close=c;
  return out;
}

/* ---------------- render with N subplots + autoscale ---------------------- */
function render(preserveRange){
  if(!DATA) return;
  const V=viewData();
  const x=V.date;
  const subs=subplotKeys();            // e.g. ["sub:0","sub:1"]
  const nSub=subs.length;
  // axis id per sub key: y2,y3,... (y reserved for price)
  const axisOf={}; subs.forEach((k,i)=>{ axisOf[k]="y"+(i+2); });

  const traces=[];
  if(CANDLE_TYPE==="line"){
    traces.push({
      type:"scatter", mode:"lines", x, y:V.close,
      name:"price", xaxis:"x", yaxis:"y", visible: SHOW_PRICE ? true : "legendonly",
      line:{width:1.5, color:"#79c0ff"},
      // ruler crosshair or measure tool with the hover readout off: keep hover
      // detection (spikes/clicks) but hide the per-point tooltip label
      ...(((MEASURE || RULER) && !HOVER) ? {hoverinfo:"none"} : {}),
    });
  } else {
    traces.push({
      type:"candlestick", x, open:V.open, high:V.high, low:V.low, close:V.close,
      name:"price", xaxis:"x", yaxis:"y", visible: (SHOW_PRICE && CANDLE_TYPE!=="hidden") ? true : "legendonly",
      increasing:{line:{color:"#26a69a"}, fillcolor:"rgba(38,166,154,0.9)"},
      decreasing:{line:{color:"#e23636"}, fillcolor:"rgba(226,54,54,0.9)"},
      // ruler crosshair or measure tool with the hover readout off: keep hover
      // detection (spikes/clicks) but hide the per-point tooltip label
      ...(((MEASURE || RULER) && !HOVER) ? {hoverinfo:"none"} : {}),
    });
  }
  ACTIVE.forEach((cfg,n)=>{
    const ax = cfg.place==="overlay" ? "y" : axisOf[cfg.place];
    traces.push({type:"scatter", mode:"lines", x, y:V[n], name:n, xaxis:"x", yaxis:ax,
      visible: cfg.hidden ? "legendonly" : true,
      opacity: cfg.opacity!=null ? cfg.opacity : 1,
      ...(((MEASURE || RULER) && !HOVER) ? {hoverinfo:"none"} : {}),
      line:{width:(cfg.width!=null ? cfg.width : 1.3), color:cfg.color}});
  });

  // analysis event markers (on price axis) — visual confirmation of computed edges.
  // Each group = one indicator/edge. We draw ENTRY (up triangle), the hypothetical
  // EXIT after the hold (x), and a faint connector line so you can see the held
  // trade. Confirmed-only entries are solid; unconfirmed are hollow/red.
  // Legacy single-set support: wrap MARKERS into one group if no groups set.
  let groups = MARKER_GROUPS;
  if((!groups || !groups.length) && MARKERS.length){
    groups = [{label:MARKER_LABEL||"events", markers:MARKERS}];
  }
  const GCOLORS=["#7ee787","#79c0ff","#d2a8ff","#ffa657","#f778ba","#56d4dd"];
  if(groups && groups.length){
    groups.forEach((g,gi)=>{
      const ms=(g.markers||[]).filter(m=>m&&m.date&&m.price!=null);
      if(!ms.length) return;
      const col=g.color||GCOLORS[gi%GCOLORS.length];
      const yes=ms.filter(m=>m.confirmed!==false);
      const no =ms.filter(m=>m.confirmed===false);
      // entries (confirmed)
      if(yes.length) traces.push({type:"scatter", mode:"markers", x:yes.map(m=>m.date), y:yes.map(m=>m.price),
        name:(g.label||"edge")+" entry ("+yes.length+")", xaxis:"x", yaxis:"y",
        marker:{symbol:"triangle-up", size:11, color:col, line:{width:1, color:"#0d0d0d"}},
        hovertext:yes.map(m=>"ENTRY "+m.date+(m.confirm_bars!=null?(" (confirmed +"+m.confirm_bars+"b)"):"")), hoverinfo:"text+y"});
      // entries (unconfirmed)
      if(no.length) traces.push({type:"scatter", mode:"markers", x:no.map(m=>m.date), y:no.map(m=>m.price),
        name:(g.label||"edge")+" unconfirmed ("+no.length+")", xaxis:"x", yaxis:"y",
        marker:{symbol:"triangle-down", size:9, color:"#ff7b72", line:{width:1, color:"#0d0d0d"}},
        hovertext:no.map(m=>"UNCONFIRMED "+m.date), hoverinfo:"text+y"});
      // hypothetical exits + connector (only for entries that have an exit point)
      const wExit=ms.filter(m=>m.exit_date&&m.exit_price!=null);
      if(wExit.length){
        // connector line: entry -> exit, broken by nulls between trades
        const cx=[], cy=[];
        wExit.forEach(m=>{ cx.push(m.date, m.exit_date, null); cy.push(m.price, m.exit_price, null); });
        traces.push({type:"scatter", mode:"lines", x:cx, y:cy,
          name:(g.label||"edge")+" hold", xaxis:"x", yaxis:"y", showlegend:false,
          line:{width:1, color:col, dash:"dot"}, opacity:0.5, hoverinfo:"skip"});
        traces.push({type:"scatter", mode:"markers", x:wExit.map(m=>m.exit_date), y:wExit.map(m=>m.exit_price),
          name:(g.label||"edge")+" exit ("+wExit.length+")", xaxis:"x", yaxis:"y",
          marker:{symbol:"x", size:9, color:col, line:{width:1, color:"#0d0d0d"}},
          hovertext:wExit.map(m=>"EXIT "+m.exit_date+(m.fwd_return_pct!=null?(" ("+m.fwd_return_pct+"%)"):"")), hoverinfo:"text+y"});
      }
    });
  }

  // vertical domain split: price gets top, subplots stack below
  // ruler crosshair spike props (toggled by RULER). xspike spans ALL panes ("across"),
  // yspike reaches each pane's own axis ("toaxis"). When off, spikes disabled.
  const xSpike = RULER ? {showspikes:true, spikemode:"across", spikesnap:"cursor", spikedash:"dot", spikethickness:1, spikecolor:"rgba(160,180,210,0.55)"} : {showspikes:false};
  const ySpike = RULER ? {showspikes:true, spikemode:"toaxis", spikesnap:"cursor", spikedash:"dot", spikethickness:1, spikecolor:"rgba(160,180,210,0.45)"} : {showspikes:false};
  const layout={
    dragmode: DRAW_MODE || "pan", showlegend:SHOW_LEGEND,
    newshape:{line:{color:DRAW_COLOR, width:2}, fillcolor:"rgba(34,211,238,0.07)", opacity:1, _draw:true},
    paper_bgcolor:"#0d0d0d", plot_bgcolor:"#0d0d0d", font:{color:"#dfe4ee", family:"'IBM Plex Mono', ui-monospace, monospace", size:11},
    legend:{bgcolor:"rgba(20,20,20,0.6)", bordercolor:"#2e2e2e", borderwidth:1, font:{size:10}},
    margin:{l:54,r:12,t:12,b:30},
    xaxis:Object.assign({rangeslider:{visible:false}, gridcolor:"#222222", zerolinecolor:"#2e2e2e", domain:[0,1], anchor: nSub? ("y"+(nSub+1)) : "y"}, xSpike),
    // Plotly only renders spike crosshairs (RULER) and fires plotly_click (MEASURE)
    // while hover detection is on. So keep hovermode active whenever the readout,
    // the ruler crosshair, or the measure tool is on. The tooltip label is hidden
    // separately (hoverinfo:"none") when the readout itself is off.
    hovermode: (HOVER || RULER || MEASURE) ? "x" : false,
  };
  // preserve x zoom
  const curX = (preserveRange && gd.layout && gd.layout.xaxis) ? gd.layout.xaxis.range : null;
  if(curX) layout.xaxis.range=curX;
  // preserve any active measure-tool shapes + user drawings across re-render
  if(gd.layout){
    const ms=(gd.layout.shapes||[]).filter(s=>s._meas);
    // preserve measure labels + user arrow annotations across re-render
    const ma=(gd.layout.annotations||[]).filter(s=>s._meas || s._arrow);
    // user drawings = any shape that isn't a measure shape or a subplot divider
    const dr=(gd.layout.shapes||[]).filter(s=>!s._meas && !s._div).map(s=>Object.assign({}, s, {_draw:true}));
    const keep=ms.concat(dr);
    if(keep.length) layout.shapes=keep;
    if(ma.length) layout.annotations=ma;
  }

  if(nSub===0){
    layout.yaxis=Object.assign({gridcolor:"#222222", zerolinecolor:"#2e2e2e", domain:[0,1]}, ySpike);
    applyYRange(layout, "yaxis", preserveRange);
  } else {
    // domains: price gets the top; subplots sit below with a compact separator
    // gap. Keep the gap small to preserve chart space, but tint it so the panes
    // read as separate regions.
    const priceTop=1.0, priceBot=SUBPLOT_SPLIT;
    const mainGap=0.018;
    const subTop=priceBot-mainGap;
    layout.yaxis=Object.assign({gridcolor:"#222222", zerolinecolor:"#2e2e2e", domain:[priceBot, priceTop]}, ySpike);
    applyYRange(layout, "yaxis", preserveRange);
    const subGap=0.02, totalH=subTop-0.0, each=(totalH-(nSub-1)*subGap)/nSub;
    // dividers: narrow color-grade shift from the normal chart bg into a
    // slightly different shade. No hard line and no wasted blank spacer.
    const dividers=[];
    const addGapBand=(y0,y1)=>{
      const steps=7, h=(y1-y0)/steps;
      for(let j=0;j<steps;j++) dividers.push({
        type:"rect", xref:"paper", yref:"paper", x0:0, x1:1, y0:y0+j*h, y1:y0+(j+1)*h,
        fillcolor:"rgba(74,88,116,"+(0.006+j*0.006)+")", line:{width:0}, layer:"below", _div:true,
      });
    };
    addGapBand(subTop, priceBot);
    subs.forEach((k,i)=>{
      const top = subTop - i*(each+subGap);
      const bot = top - each;
      const aid = "yaxis"+(i+2);
      layout[aid]=Object.assign({gridcolor:"#222222", zerolinecolor:"#2e2e2e", domain:[Math.max(0,bot), top], title:{text:subTitle(k), font:{size:9}}}, ySpike);
      applyYRange(layout, aid, preserveRange);
      if(i>0) addGapBand(top, Math.min(1, top + subGap));
    });
    layout.shapes = (layout.shapes||[]).filter(s=>!s._div).concat(dividers);
  }
  Plotly.react(gd, traces, layout, {scrollZoom:false, displayModeBar:true, responsive:true})
    .then(positionYZone).then(positionSplitter).then(positionPlotStatus).then(()=>{ try{updateChartHead(null);}catch(e){} });
}
// Place the Y-axis zoom strip over the left edge of the price plot.
function positionYZone(){
  const fl = gd._fullLayout; if(!fl || !fl.yaxis) return;
  const yz=document.getElementById("yzone"); if(!yz) return;
  const left=document.getElementById("chartcol");
  const cb=gd.getBoundingClientRect(), lb=left.getBoundingClientRect();
  const ox=cb.left-lb.left, oy=cb.top-lb.top;
  const xa=fl.xaxis, ya=fl.yaxis;
  if(xa._offset==null || ya._offset==null) return;   // geometry not ready yet
  const W=Math.max(34, Math.min(xa._offset, 60));   // cover the price-label gutter
  yz.style.left=(ox + Math.max(0, xa._offset - W))+"px"; // sit ON the price scale, not inside the plot
  yz.style.top =(oy + ya._offset)+"px";              // price y-axis top
  yz.style.width=W+"px";
  yz.style.height=ya._length+"px";                   // full price-plot height
  yz.style.display="block";
}
// Place the horizontal resize handle on the gap between the price pane and the
// subplot stack. Hidden when there are no subplots. Dragging it grows/shrinks
// the bottom pane (see wireSplitter).
function positionSplitter(){
  const ss=document.getElementById("subsplit"); if(!ss) return;
  const fl=gd._fullLayout;
  // y2 only exists when there is at least one subplot.
  if(!fl || !fl.yaxis2 || fl.yaxis2._offset==null){ ss.style.display="none"; return; }
  const left=document.getElementById("chartcol");
  const cb=gd.getBoundingClientRect(), lb=left.getBoundingClientRect();
  const oy=cb.top-lb.top;
  // boundary = bottom of the price axis = top of the gap band. Center the handle on it.
  const priceBottomPx = fl.yaxis._offset + fl.yaxis._length;
  ss.style.top=(oy + priceBottomPx - 4)+"px";
  ss.style.display="block";
}
function subTitle(k){
  // label subplot by dominant bucket of its members
  const buckets={};
  ACTIVE.forEach((cfg,n)=>{ if(cfg.place===k){ const b=(RANGES[n]||{}).bucket||"?"; buckets[b]=(buckets[b]||0)+1; } });
  return Object.keys(buckets).sort((a,b)=>buckets[b]-buckets[a])[0]||"";
}
// y-axis mode: auto (autorange), manual (freeze current range), log (log scale + autorange)
function applyYRange(layout, axKey, preserveRange){
  layout[axKey] = layout[axKey] || {};
  if(YMODE==="log"){
    layout[axKey].type="log";
    layout[axKey].autorange=true;
    return;
  }
  layout[axKey].type="linear";
  if(YMODE==="auto"){ layout[axKey].autorange=true; return; }
  // manual: freeze whatever range that axis currently shows
  const cur = gd.layout && gd.layout[axKey] && gd.layout[axKey].range;
  if(cur && preserveRange){ layout[axKey].range=cur.slice(); layout[axKey].autorange=false; }
  else layout[axKey].autorange=true;  // first paint -> autorange, user then locks
}

/* ---------------- presets ------------------------------------------------- */
function snapshotConfig(){
  const o={}; ACTIVE.forEach((cfg,n)=>{ o[n]={place:cfg.place, color:cfg.color, width:cfg.width, opacity:cfg.opacity, hidden:cfg.hidden}; }); return o;
}
function applyConfig(cfg){
  ACTIVE.clear();
  Object.entries(cfg||{}).forEach(([n,c])=>{ ACTIVE.set(n, {place:c.place||defaultPlace(n), color:c.color||nextColor(), width:c.width, opacity:c.opacity, hidden:!!c.hidden}); });
  render(true); buildActive(); buildIndPanel();
}
function loadPresetSel(){
  const sel=document.getElementById("presetsel");
  sel.innerHTML='<option value="">—</option>';
  Object.keys(PRESETS).sort().forEach(n=>{ const o=document.createElement("option"); o.value=n; o.textContent=n; sel.appendChild(o); });
}
document.getElementById("presetsave").onclick=()=>{
  const name=prompt("preset name:"); if(!name) return;
  PRESETS[name]=snapshotConfig(); savePresets(); loadPresetSel();
  CUR_PRESET=name;
  document.getElementById("presetsel").value=name; addMsg("saved preset \""+name+"\" ("+ACTIVE.size+" indicators)","sys");
};
document.getElementById("presetapply").onclick=()=>{
  const n=document.getElementById("presetsel").value; if(!n||!PRESETS[n]) return;
  CUR_PRESET=n;
  applyConfig(PRESETS[n]); addMsg("applied preset \""+n+"\"","sys");
};
document.getElementById("presetdel").onclick=()=>{
  const n=document.getElementById("presetsel").value; if(!n||!PRESETS[n]) return;
  if(!confirm("delete preset \""+n+"\"?")) return;
  if(CUR_PRESET===n) CUR_PRESET="";
  delete PRESETS[n]; savePresets(); loadPresetSel(); addMsg("deleted preset \""+n+"\"","sys");
};
/* compact preset UI: dropdown auto-applies, one Save button, one delete icon */
document.getElementById("presetsel").onchange=(e)=>{
  const n=e.target.value; CUR_PRESET=(n&&PRESETS[n])?n:""; if(n && PRESETS[n]){ applyConfig(PRESETS[n]); addMsg("applied preset \""+n+"\"","sys"); }
};
document.getElementById("presetsavenew").onclick=()=>document.getElementById("presetsave").onclick();
document.getElementById("presetdelnew").onclick=()=>document.getElementById("presetdel").onclick();

/* ---------------- slash commands (typed in the chat box) ------------------ */
/* /clear : remove all AI-added markers + user drawings, then restore whatever
   indicators are in the currently-applied preset (empty set if no preset).  */
function clearToPreset(){
  // 1) drop analysis markers / overlays
  clearOverlays();
  MARKERS=[]; MARKER_LABEL="";
  // 2) drop user drawings + arrow annotations (keep measure shapes + subplot dividers)
  if(gd && gd.layout){
    const keepShapes=(gd.layout.shapes||[]).filter(s=>s._meas||s._div);
    const keepAnno=(gd.layout.annotations||[]).filter(a=>!a._arrow);
    Plotly.relayout(gd,{shapes:keepShapes, annotations:keepAnno});
  }
  // 3) restore the preset's indicator set (or clear all if no preset active)
  if(CUR_PRESET && PRESETS[CUR_PRESET]) applyConfig(PRESETS[CUR_PRESET]);
  else { ACTIVE.clear(); render(true); buildActive(); buildIndPanel(); }
  const tag = (CUR_PRESET && PRESETS[CUR_PRESET]) ? (" - kept preset \""+CUR_PRESET+"\"") : " - chart bare (no preset active)";
  addMsg("Cleared all markers and drawings"+tag+".","sys");
}
const SLASH_CMDS=[
  {cmd:"/clear", desc:"clear markers + drawings, keep preset", run:clearToPreset},
];
/* returns true if the text was a slash command (already handled, do not send to AI) */
function runSlash(text){
  const t=(text||"").trim();
  const c=SLASH_CMDS.find(x=>x.cmd===t || t.startsWith(x.cmd+" "));
  if(!c) return false;
  c.run();
  return true;
}

/* ---------------- zoom-aware reload --------------------------------------- */
let zoomTimer=null;
function onRelayout(ev){
  if(!ev) return;
  // arrow tool: Plotly just added a line shape — turn the newest user line into an arrow annotation
  if(DRAW_MODE==="arrow" && gd.layout && Array.isArray(gd.layout.shapes)){
    const lines=gd.layout.shapes.filter(s=>!s._meas && !s._div && s.type==="line");
    if(lines.length){
      const ln=lines[lines.length-1];
      const keep=gd.layout.shapes.filter(s=>s!==ln);
      const anns=(gd.layout.annotations||[]).slice();
      anns.push({
        x:ln.x1, y:ln.y1, ax:ln.x0, ay:ln.y0,
        xref:ln.xref||"x", yref:ln.yref||"y", axref:ln.xref||"x", ayref:ln.yref||"y",
        showarrow:true, arrowhead:3, arrowsize:1.4, arrowwidth:2, arrowcolor:DRAW_COLOR,
        text:"", _arrow:true,
      });
      Plotly.relayout(gd,{shapes:keep, annotations:anns});
      return;
    }
  }
  if(ev["xaxis.autorange"]===true){ if(CUR_RANGE){ CUR_RANGE=null; reloadSlice(null,null); } return; }
  const s=ev["xaxis.range[0]"], e=ev["xaxis.range[1]"];
  if(s===undefined||e===undefined) return;
  clearTimeout(zoomTimer);
  zoomTimer=setTimeout(()=>reloadSlice(s,e), 250);
}
async function reloadSlice(s,e){
  // Fetch a window wider than the visible range so price/indicators are not
  // clipped at the view edges (TradingView-style: data exists just outside view).
  let fs=s, fe=e;
  if(s && e){
    const t0=new Date(s).getTime(), t1=new Date(e).getTime();
    if(isFinite(t0)&&isFinite(t1)&&t1>t0){
      const pad=(t1-t0)*PAD_FRAC;
      fs=new Date(t0-pad).toISOString();
      fe=new Date(t1+pad).toISOString();
    }
  }
  const fstart=fs?new Date(fs).toISOString():null, fend=fe?new Date(fe).toISOString():null;
  setStatus("loading slice…");
  const d=await fetchData(CUR_PAIR, fstart, fend);
  DATA=d; CUR_RANGE=(s||e)?[s?new Date(s).toISOString():null, e?new Date(e).toISOString():null]:null;
  setStatus(CUR_PAIR+"  "+DATA._n_total+" bars in view"+(DATA._downsampled?" (showing "+DATA.date.length+")":""));
  render(true);  // render() preserves the current x-axis view ([s,e]), not the padded fetch range
}

/* ---------------- autoscale toggle ---------------------------------------- */
function setYMode(mode){
  YMODE = mode;
  AUTOSCALE = (mode==="auto");  // keep back-compat flag in sync (sent to brain)
  const b=document.getElementById("ymodebtn");
  if(b){
    b.textContent = {auto:"Y-A", manual:"Y-M", log:"Y-L"}[mode] || "Y-A";
    b.classList.toggle("log", mode==="log");
    b.title = {auto:"y-axis: auto (click to cycle)", manual:"y-axis: manual / frozen (click to cycle)", log:"y-axis: log (equal % spacing) (click to cycle)"}[mode];
  }
  render(true);
}
function setAutoscale(on){ setYMode(on ? "auto" : "manual"); }
function cycleYMode(){
  const order=["auto","manual","log"];
  setYMode(order[(order.indexOf(YMODE)+1)%order.length]);
}

/* ---------------- brain ops ----------------------------------------------- */
const OPS = {
  set_pair: async (a)=>{ await loadData(a.pair); },
  show_indicator: (a)=>{ if(!ACTIVE.has(a.name)) ACTIVE.set(a.name,{place:a.subplot!=null?("sub:"+a.subplot):defaultPlace(a.name), color:a.color||nextColor()}); render(true); buildActive(); buildIndPanel(); },
  hide_indicator: (a)=>{ ACTIVE.delete(a.name); render(true); buildActive(); buildIndPanel(); },
  hide_all_indicators: ()=>{ ACTIVE.clear(); render(true); buildActive(); buildIndPanel(); },
  show_only: (a)=>{ ACTIVE.clear(); (a.names||[]).forEach(n=>ACTIVE.set(n,{place:defaultPlace(n),color:nextColor()})); render(true); buildActive(); buildIndPanel(); },
  set_color: (a)=>{ const c=ACTIVE.get(a.name); if(c){ c.color=a.color; render(true); buildActive(); } },
  set_subplot: (a)=>{ const c=ACTIVE.get(a.name); if(c){ c.place=a.place||("sub:"+a.subplot); render(true); buildActive(); } },
  set_autoscale: (a)=>{ setAutoscale(!!a.on); },
  set_ymode: (a)=>{ const m=(a.mode||"").toLowerCase(); if(["auto","manual","log"].includes(m)) setYMode(m); },
  apply_preset: (a)=>{ if(PRESETS[a.name]) applyConfig(PRESETS[a.name]); },
  save_preset: (a)=>{ if(a.name){ PRESETS[a.name]=snapshotConfig(); savePresets(); loadPresetSel(); } },
  zoom: (a)=>{ Plotly.relayout(gd, {"xaxis.range":[a.start,a.end]}); reloadSlice(a.start,a.end); },
  zoom_y: (a)=>{ Plotly.relayout(gd, {"yaxis.range":[a.min,a.max]}); },
  jump_to_date: (a)=>{
    if(!a.date) return;
    const c=new Date(a.date).getTime(); if(!isFinite(c)) return;
    const bars=Math.max(20, a.bars||200);
    const half=bars*15*60*1000/2;                 // 15-min bars -> ms half-window
    const s=new Date(c-half).toISOString(), e=new Date(c+half).toISOString();
    Plotly.relayout(gd, {"xaxis.range":[s,e]}); reloadSlice(s,e);
  },
  request_screenshot: ()=>{},   // handled by the chat loop (re-screenshots + continues)
  reset_zoom: ()=>{ Plotly.relayout(gd, {"xaxis.autorange":true,"yaxis.autorange":true}); reloadSlice(null,null); },
  pan: (a)=>{
    const xr=gd.layout.xaxis.range; if(!xr) return;
    const t0=new Date(xr[0]).getTime(), t1=new Date(xr[1]).getTime(); const w=t1-t0; const dx=w*(a.fraction||0.5);
    const ns=new Date(t0+dx).toISOString(), ne=new Date(t1+dx).toISOString();
    Plotly.relayout(gd, {"xaxis.range":[ns,ne]}); reloadSlice(ns,ne);
  },
  mark: (a)=>{
    // analysis markers -> registry overlay(s) on the current pair (so they get a provenance chip
    // and coexist with backtest overlays instead of clobbering them).
    OVERLAYS = OVERLAYS.filter(o=>o.kind!=="analysis");  // replace prior analysis marks
    let groups;
    if(a.groups && a.groups.length){
      groups=a.groups.map(g=>({label:g.label||"edge",
        markers:(g.markers||[]).filter(m=>m&&m.date&&m.price!=null)}));
    } else {
      groups=[{label:a.label||"events",
        markers:(a.markers||[]).filter(m=>m&&m.date&&m.price!=null)}];
    }
    MARKERS=[]; MARKER_LABEL="";
    groups.forEach(g=>{
      if(!g.markers.length) return;
      addOverlay({ kind:"analysis", label:g.label,
        meta:uiPairDisplay(CUR_PAIR)+" · "+g.markers.length+" marks",
        pair:CUR_PAIR, range:null, markers:g.markers });
    });
  },
  clear_marks: ()=>{ MARKERS=[]; MARKER_LABEL="";
    OVERLAYS=OVERLAYS.filter(o=>o.kind!=="analysis"); syncOverlays(); },

  // ---- AI callout drawings (arrows / boxes / lines / text labels) ----
  // These reuse the same _arrow / _draw tag system as the manual drawing tools,
  // so they survive pan/zoom and appear in the screenshot the AI sees next turn.
  draw_arrow: (a)=>{
    if(!a||a.x==null||a.y==null) return;
    const col=a.color||AI_DRAW_COLOR;
    // tail offset: arrow points AT (x,y); tail sits up-and-left unless caller gives ax/ay
    const ax = a.ax!=null ? a.ax : a.x;
    const ay = a.ay!=null ? a.ay : a.y;
    const auto = (a.ax==null && a.ay==null);   // no explicit tail -> use pixel offset so it always points down at the bar
    const ann = {
      x:a.x, y:a.y, xref:"x", yref:"y",
      showarrow:true, arrowhead:3, arrowsize:1.4, arrowwidth:2.4, arrowcolor:col,
      text:a.text||"", font:{color:col, size:12}, bgcolor:a.text?"rgba(10,10,10,0.7)":"rgba(0,0,0,0)",
      bordercolor:a.text?col:"rgba(0,0,0,0)", borderpad:a.text?3:0,
      _arrow:true,
    };
    if(auto){ ann.ax=0; ann.ay=-46; }   // pixel offset (points up); standoff keeps head off the candle
    else { ann.ax=ax; ann.ay=ay; ann.axref="x"; ann.ayref="y"; }
    if(a.standoff!=null) ann.standoff=a.standoff;
    const anns=(gd.layout&&gd.layout.annotations||[]).slice(); anns.push(ann);
    Plotly.relayout(gd,{annotations:anns});
  },
  draw_box: (a)=>{
    if(!a||a.x0==null||a.x1==null||a.y0==null||a.y1==null) return;
    const col=a.color||AI_DRAW_COLOR;
    const sh={type:"rect", xref:"x", yref:"y", x0:a.x0, x1:a.x1, y0:a.y0, y1:a.y1,
      line:{color:col, width:2}, fillcolor:a.fill||"rgba(245,158,11,0.10)", layer:"above", _draw:true};
    const shapes=(gd.layout&&gd.layout.shapes||[]).slice(); shapes.push(sh);
    const relay={shapes};
    if(a.text){
      const anns=(gd.layout&&gd.layout.annotations||[]).slice();
      anns.push({x:a.x0, y:a.y1, xref:"x", yref:"y", showarrow:false, xanchor:"left", yanchor:"bottom",
        text:a.text, font:{color:col, size:12}, bgcolor:"rgba(10,10,10,0.7)", bordercolor:col, borderpad:3, _arrow:true});
      relay.annotations=anns;
    }
    Plotly.relayout(gd,relay);
  },
  draw_line: (a)=>{
    if(!a||a.x0==null||a.x1==null||a.y0==null||a.y1==null) return;
    const col=a.color||AI_DRAW_COLOR;
    const sh={type:"line", xref:"x", yref:"y", x0:a.x0, x1:a.x1, y0:a.y0, y1:a.y1,
      line:{color:col, width:a.width||2, dash:a.dash||"solid"}, layer:"above", _draw:true};
    const shapes=(gd.layout&&gd.layout.shapes||[]).slice(); shapes.push(sh);
    Plotly.relayout(gd,{shapes});
  },
  add_label: (a)=>{
    if(!a||a.x==null||a.y==null||!a.text) return;
    const col=a.color||AI_DRAW_COLOR;
    const anns=(gd.layout&&gd.layout.annotations||[]).slice();
    anns.push({x:a.x, y:a.y, xref:"x", yref:"y", showarrow:false, xanchor:a.anchor||"center", yanchor:"middle",
      text:a.text, font:{color:col, size:a.size||12}, bgcolor:"rgba(10,10,10,0.72)", bordercolor:col, borderpad:4, _arrow:true});
    Plotly.relayout(gd,{annotations:anns});
  },
  clear_drawings: ()=>{
    const keep=(gd.layout&&gd.layout.shapes||[]).filter(s=>s._meas||s._div);
    const akeep=(gd.layout&&gd.layout.annotations||[]).filter(a=>a._meas);
    Plotly.relayout(gd,{shapes:keep, annotations:akeep});
  },
};
function markCount(a){
  if(a&&a.groups) return a.groups.reduce((s,g)=>s+((g.markers||[]).length),0);
  return (a&&a.markers||[]).length;
}
// friendly label + monochrome glyph for each op, shown as a chip after the reply

async function runActions(actions){
  const row=document.createElement("div"); row.className="acts";
  logEl.appendChild(row);
  for(const act of actions){
    const fn=OPS[act.op];
    const chip=document.createElement("span");
    if(fn){
      const f=OP_LABELS[act.op];
      const pair=f?f(act.args||{}):["•",act.op];
      chip.className="achip";
      const g=document.createElement("span"); g.className="g"; g.textContent=pair[0];
      const t=document.createElement("span"); t.textContent=pair[1];
      chip.appendChild(g); chip.appendChild(t);
      row.appendChild(chip);
      logEl.scrollTop=logEl.scrollHeight;
      await fn(act.args||{});
    } else {
      chip.className="achip unknown";
      const g=document.createElement("span"); g.className="g"; g.textContent="?";
      const t=document.createElement("span"); t.textContent=act.op;
      chip.appendChild(g); chip.appendChild(t);
      row.appendChild(chip);
    }
  }
  if(!row.children.length) row.remove();
  logEl.scrollTop=logEl.scrollHeight;
}

function chartState(){
  const xr = gd.layout && gd.layout.xaxis ? gd.layout.xaxis.range : null;
  const shown={}; ACTIVE.forEach((c,n)=>shown[n]={place:c.place,color:c.color});
  return {
    pair: CUR_PAIR, strategy: CUR_STRAT, visible_x: xr, autoscale: AUTOSCALE,
    shown, favorites:[...FAVS], presets:Object.keys(PRESETS),
    n_bars: DATA?DATA._n_total:0,
    date_min: FULL_RANGE?FULL_RANGE[0]:null, date_max: FULL_RANGE?FULL_RANGE[1]:null,
    all_indicators: COLS.indicators,
  };
}

/* Capture the current chart as a PNG and upload it so the AI can SEE it.
   Returns the server-side file path, or null on failure (chat still works text-only). */
async function captureChart(){
  try{
    const w=Math.min(1600, gd.clientWidth||1200), h=Math.min(900, gd.clientHeight||600);
    const url=await Plotly.toImage(gd,{format:"png", width:w, height:h, scale:1});
    const r=await fetch(API+"/api/screenshot",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({png_b64:url})});
    const j=await r.json();
    return j&&j.ok ? j.path : null;
  }catch(e){ return null; }
}

/* Run ONE chat turn: post text + chart_state (+ screenshot path), poll for the
   reply, render it, apply ops. Returns the result object (so the caller can see
   if the AI asked to look again). */
async function chatTurn(text, pend, shotPath){
  const t0=performance.now();   // measure wall-clock to the rendered reply
  const state=chartState();
  if(shotPath) state.screenshot_path=shotPath;
  const sel=document.getElementById("modelsel");
  const chosen=(sel&&sel.value)||null;   // send model atomically so it can't race the /api/model POST
  const r=await fetch(API+"/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text, chart_state:state, model:chosen})});
  const {id}=await r.json();
  CUR_MID=id;                          // expose for the Stop button + live activity tail
  startActivityTail(id, pend);
  for(let i=0;i<2400;i++){            // up to 20 min (brain hard-caps each model call at 180s)
    await new Promise(s=>setTimeout(s,500));
    let res;
    try{ res=await fetch(API+"/api/chat/result/"+id).then(x=>x.json()); }
    catch(e){ continue; }             // transient (server restart) — keep waiting
    if(res.ready){
      stopActivityTail();
      stopLoading(pend);
      if(res.cancelled){ pend.classList.add("stopped"); }
      // stream the reply out with a typewriter animation; run any chart actions
      // in parallel so the chart updates while the text types.
      const streaming=streamBot(pend, res.reply, res.model_used, performance.now()-t0);
      if(res.actions&&res.actions.length) await runActions(res.actions);
      await streaming;
      CUR_MID=null;
      return res;
    }
  }
  stopActivityTail();
  stopLoading(pend); pend.textContent="(timeout waiting for brain after 20 min)";
  CUR_MID=null;
  return null;
}

// the in-flight turn id, so the Stop button knows what to cancel
let CUR_MID=null;
async function stopCurrentTurn(){
  // if the reply is currently typing out, snap it to full text immediately
  document.querySelectorAll(".msg.bot.streaming").forEach(cancelStream);
  if(!CUR_MID) return;
  const id=CUR_MID;
  try{ await fetch(API+"/api/chat/cancel/"+id,{method:"POST"}); }catch(e){}
  // the poll loop will pick up the "(stopped by user)" result on its next tick
}

/* ---------- activity log: live tail of what the analyst (brain) is doing ---------- */
let _actTimer=null, _actSince=0, _actMid=null, _actPend=null, _actSeen=[];
function fmtTs(ts){ const d=new Date(ts*1000); return d.toLocaleTimeString([], {hour12:false}); }
function metaStr(m){
  if(!m||typeof m!=="object") return "";
  const parts=[];
  for(const k of Object.keys(m)){
    let v=m[k];
    if(v==null) continue;
    parts.push(k+"="+(typeof v==="object"?JSON.stringify(v):v));
  }
  return parts.join("  ");
}
function logRowHTML(e){
  const ph=(e.phase||"").replace(/[^a-z0-9_-]/gi,"");
  const det=(e.detail||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const ms=metaStr(e.meta).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  return '<div class="logrow ph-'+ph+'">'
    +'<span class="lt-ts">'+fmtTs(e.ts)+'</span>'
    +'<span class="lt-ph">'+ph+'</span>'
    +'<span class="lt-de">'+det+(ms?('  <span class="lt-ms">'+ms+'</span>'):'')+'</span>'
    +'</div>';
}
function renderActivity(events){
  const body=document.getElementById("logsbody");
  if(!_actSeen.length && !events.length){
    body.innerHTML='<div id="logsempty">No activity yet. Ask the analyst something — phases, ops and subprocess timings will stream here.</div>';
    return;
  }
  if(events.length){
    const atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
    const html=events.map(logRowHTML).join("");
    if(document.getElementById("logsempty")) body.innerHTML="";
    body.insertAdjacentHTML("beforeend", html);
    if(atBottom) body.scrollTop=body.scrollHeight;
  }
}
function pushInlineActivity(e){
  // Turn the raw brain phase/detail into a short, friendly "what it's doing now"
  // sentence and append it to the live step trail inside the pending bot bubble.
  if(!_actPend) return;
  const friendly=friendlyStep(e);
  if(!friendly) return;            // skip noise (heartbeats, dupes)
  addStep(_actPend, friendly, e.phase);
}
// Map a raw activity event to {text, kind} or null to skip it.
function friendlyStep(e){
  const ph=(e.phase||""), det=(e.detail||"");
  // decideN / force_answer / answer -> "thinking" style; *_done -> completes it
  if(/^decide\d+$/.test(ph))        return {text:"Thinking through the question", kind:"think"};
  if(/^decide\d+_done$/.test(ph))   return null;   // completion handled by next step
  if(ph==="received")               return {text:"Reading your message and the chart", kind:"read"};
  if(ph==="fetch")                  return {text:"Pulling indicator / strategy source", kind:"read"};
  if(ph==="model_call")             return {text:"Writing the analysis plan", kind:"write"};
  if(ph==="model_call_done")        return null;
  if(ph==="force_answer")           return {text:"Composing the answer", kind:"write"};
  if(ph==="op")                     return {text:"Running the calculation in Python", kind:"calc"};
  if(ph==="op_done"){
    const ok=/-> ok/.test(det);
    return {text: ok?"Reading the computed results":"Calculation finished (with an issue)", kind:"read"};
  }
  if(ph==="answer")                 return {text:"Writing the final response", kind:"write"};
  if(ph==="answer_done")            return null;
  if(ph==="query")                  return {text:"Preparing the data query", kind:"calc"};
  if(ph==="requeue")                return {text:"Retrying (reconnecting to the analyst)", kind:"think"};
  if(ph==="timeout")                return {text:"Taking longer than expected…", kind:"think"};
  if(ph==="stopped"||ph==="cancel") return {text:"Stopped", kind:"done"};
  if(ph==="error")                  return {text:"Hit an error: "+det.slice(0,60), kind:"err"};
  if(ph==="done")                   return null;
  return null;
}
const STEP_ICONS={
  think:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><circle class="spin" cx="12" cy="12" r="9" stroke-dasharray="40 18"/></svg>',
  read:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M4 5h16M4 12h12M4 19h8"/></svg>',
  write:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
  calc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8M8 11h2M8 15h2"/></svg>',
  done:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" width="12" height="12"><path d="M5 13l4 4L19 7"/></svg>',
  err:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16.5v.01"/></svg>',
};
const DONE_ICON=STEP_ICONS.done;
function addStep(pend, f, phase){
  let wrap=pend.querySelector(".steps");
  if(!wrap){
    // first step: drop the generic spinner, start the trail
    pend.innerHTML='<div class="steps"></div>';
    wrap=pend.querySelector(".steps");
  }
  const prev=wrap.querySelector(".step.cur");
  if(prev){
    // collapse identical consecutive steps so the trail stays short
    if(prev.dataset.text===f.text) return;
    prev.classList.remove("cur"); prev.classList.add("done");
    const si=prev.querySelector(".si"); if(si) si.innerHTML=DONE_ICON;
  }
  const row=document.createElement("div");
  row.className="step cur"; row.dataset.text=f.text;
  row.innerHTML='<span class="si">'+(STEP_ICONS[f.kind]||STEP_ICONS.think)+'</span><span class="st">'+f.text+'</span>';
  wrap.appendChild(row);
  // cap the visible trail to the last 6 steps
  while(wrap.children.length>6) wrap.removeChild(wrap.firstChild);
  logEl.scrollTop=logEl.scrollHeight;
}
async function pollActivity(){
  try{
    const q=new URLSearchParams({since:_actSince, limit:"200"});
    if(_actMid) q.set("mid", _actMid);
    const r=await fetch(API+"/api/activity?"+q.toString()).then(x=>x.json());
    const evs=r.events||[];
    if(evs.length){
      _actSince=evs[evs.length-1].ts;
      _actSeen.push(...evs);
      if(document.body.classList.contains("logs-open")) renderActivity(evs);
      // drive the friendly step trail with EVERY new event (not just the last),
      // otherwise batched polls drop the meaningful intermediate phases.
      for(const e of evs) pushInlineActivity(e);
    }
  }catch(e){}
}
function startActivityTail(mid, pend){
  _actMid=mid; _actPend=pend; _actSince=0; _actSeen=[];
  document.getElementById("logsbtn").classList.add("live");
  if(document.body.classList.contains("logs-open")) document.getElementById("logsbody").innerHTML="";
  if(_actTimer) clearInterval(_actTimer);
  pollActivity();
  _actTimer=setInterval(pollActivity, 700);
}
function stopActivityTail(){
  if(_actTimer){ clearInterval(_actTimer); _actTimer=null; }
  pollActivity();                       // final flush
  document.getElementById("logsbtn").classList.remove("live");
  _actPend=null;
}
function openLogs(){
  document.body.classList.add("logs-open");
  document.getElementById("logspanel").classList.add("show");
  const body=document.getElementById("logsbody");
  body.innerHTML="";
  if(_actSeen.length){ renderActivity(_actSeen); body.scrollTop=body.scrollHeight; return; }
  // idle open with nothing in memory: pull recent history from the server ring buffer
  renderActivity([]);
  fetch(API+"/api/activity?since=0&limit=200").then(x=>x.json()).then(r=>{
    const evs=r.events||[];
    if(evs.length){ _actSeen.push(...evs); _actSince=evs[evs.length-1].ts; renderActivity(evs); body.scrollTop=body.scrollHeight; }
  }).catch(()=>{});
}
function closeLogs(){
  document.body.classList.remove("logs-open");
  document.getElementById("logspanel").classList.remove("show");
}
document.getElementById("logsbtn").onclick=()=>{
  if(document.body.classList.contains("logs-open")) closeLogs(); else openLogs();
};
document.getElementById("logsclose").onclick=closeLogs;

async function newChat(){
  if(document.getElementById("send").classList.contains("busy")){
    addMsg("finish or stop the current turn before starting a new chat.","sys"); return;
  }
  if(!confirm("Start a new chat? This clears the current conversation (it's archived, not lost).")) return;
  try{ await fetch(API+"/api/chat/new",{method:"POST"}); }catch(e){}
  // wipe the on-screen transcript, close the logs panel, reset activity memory
  closeLogs();
  _actSeen=[]; _actSince=0; _actMid=null; _actPend=null;
  logEl.innerHTML="";
  addMsg("New chat started. Ask the analyst anything.","sys");
}
document.getElementById("newchatbtn").onclick=newChat;

async function send(){
  const inp=document.getElementById("input");
  const text=inp.value.trim(); if(!text) return;
  // intercept local slash commands (e.g. /clear) - handled client-side, never sent to the AI
  if(text[0]==="/" && runSlash(text)){
    inp.value=""; autogrow(); updateSendState(); addMsg(text,"user");
    return;
  }
  inp.value=""; autogrow(); updateSendState(); addMsg(text,"user");
  let done=false;
  try{
    let shot=await captureChart();               // the AI sees what you see
    let pend=addMsg("","bot"); startLoading(pend);
    let res=await chatTurn(text, pend, shot);
    // re-look loop: if the AI asked for a fresh screenshot after its ops, grab one
    // and continue the SAME investigation. Capped so it can't loop forever.
    let look=res && wantsScreenshot(res.actions);
    for(let hop=0; hop<3 && look; hop++){
      await new Promise(s=>setTimeout(s,450));   // let the chart finish re-rendering
      shot=await captureChart();
      pend=addMsg("","bot"); startLoading(pend);
      res=await chatTurn("(continue — here is the updated chart you asked to see)", pend, shot);
      look=res && wantsScreenshot(res.actions);
    }
    done=true; return;
  } finally {
    setBusy(false);
  }
}
function wantsScreenshot(actions){
  return !!(actions && actions.some(a=>a && a.op==="request_screenshot"));
}


/* ---------- loading animation ---------- */
const LOAD_MSGS=["thinking","reading the data","running the analysis","crunching numbers","checking the edge","scoring outcomes"];
let _loadTimers=new WeakMap();
function setBusy(on){
  document.getElementById("busydot").classList.toggle("on",on);
  const b=document.getElementById("send");
  b.classList.toggle("busy",on);
  // while busy the button becomes a STOP control, so keep it enabled+titled
  if(on){ b.disabled=false; b.title="stop"; } else { b.title="send"; updateSendState(); }
}
function startLoading(el){
  setBusy(true);
  el.classList.remove("bot"); el.classList.add("bot");
  let mi=0;
  el.innerHTML='<div class="loading"><span class="dots"><i></i><i></i><i></i></span><span class="lt shimmer">'+LOAD_MSGS[0]+'…</span></div>';
  logEl.scrollTop=logEl.scrollHeight;
  const t0=Date.now();
  const timer=setInterval(()=>{
    mi=(mi+1)%LOAD_MSGS.length;
    const secs=Math.floor((Date.now()-t0)/1000);
    const lt=el.querySelector(".lt");
    if(lt) lt.textContent=LOAD_MSGS[mi]+"… "+(secs>2?("("+secs+"s)"):"");
  },1800);
  _loadTimers.set(el,timer);
}
function stopLoading(el){
  const t=_loadTimers.get(el); if(t){ clearInterval(t); _loadTimers.delete(el); }
  setBusy(false);
}

document.getElementById("send").onclick=()=>{
  // busy = this button is the Stop control; otherwise it sends.
  if(document.getElementById("send").classList.contains("busy")){ stopCurrentTurn(); }
  else { send(); }
};

/* ---------- textarea: autogrow + key handling + indicator autocomplete ---------- */
const inputEl = document.getElementById("input");
const acBox = document.getElementById("acbox");
let acItems = [];      // [{name,cat}]
let acSel = -1;
let acStart = -1;      // index of the trigger char ('\' or '/') in the textarea value
let acMode = "ind";    // "ind" = indicator (\), "slash" = command (/)

function autogrow(){
  inputEl.style.height="auto";
  inputEl.style.height=Math.min(inputEl.scrollHeight,160)+"px";
}
inputEl.addEventListener("input",()=>{ autogrow(); updateAC(); updateSendState(); });

function updateAC(){
  const val=inputEl.value;
  const pos=inputEl.selectionStart;
  // slash command: '/' as the very first char of the input (whole box is the command)
  if(val[0]==="/" && val.indexOf("\n")<0 && val.indexOf(" ")<0){
    acMode="slash"; acStart=0;
    const frag=val.slice(1,pos).toLowerCase();
    acItems=SLASH_CMDS.filter(c=>c.cmd.slice(1).toLowerCase().startsWith(frag))
                      .map(c=>({name:c.cmd, cat:c.desc}));
    if(!acItems.length){ hideAC(); return; }
    acSel=0; renderAC(); return;
  }
  // indicator autocomplete: find a '\' before cursor with no whitespace between it and cursor
  acMode="ind";
  let bs=-1;
  for(let i=pos-1;i>=0;i--){
    const ch=val[i];
    if(ch==="\\"){ bs=i; break; }
    if(ch===" "||ch==="\n"||ch==="\t"){ break; }
  }
  if(bs<0){ hideAC(); return; }
  acStart=bs;
  const frag=val.slice(bs+1,pos).toLowerCase();
  const cols=(COLS&&COLS.indicators)?COLS.indicators:[];
  acItems=cols.filter(n=>n.toLowerCase().includes(frag)).slice(0,40).map(n=>({name:n,cat:catOf(n)}));
  if(!acItems.length){ hideAC(); return; }
  acSel=0; renderAC();
}
function renderAC(){
  acBox.innerHTML="";
  acItems.forEach((it,i)=>{
    const d=document.createElement("div");
    d.className="acitem"+(i===acSel?" sel":"");
    d.innerHTML="<span>"+it.name+"</span><span class='cat'>"+it.cat+"</span>";
    d.onmousedown=(e)=>{ e.preventDefault(); pickAC(i); };
    acBox.appendChild(d);
  });
  acBox.classList.add("show");
  const sel=acBox.querySelector(".acitem.sel"); if(sel) sel.scrollIntoView({block:"nearest"});
}
function hideAC(){ acBox.classList.remove("show"); acItems=[]; acSel=-1; acStart=-1; }
function pickAC(i){
  if(i<0||i>=acItems.length) return;
  const name=acItems[i].name;
  if(acMode==="slash"){
    // fill the whole box with the command; user presses Enter to run it
    inputEl.value=name;
    inputEl.setSelectionRange(name.length,name.length);
    hideAC(); autogrow(); inputEl.focus(); return;
  }
  const val=inputEl.value;
  const pos=inputEl.selectionStart;
  const before=val.slice(0,acStart);          // drop the backslash too
  const after=val.slice(pos);
  const ins=name+" ";
  inputEl.value=before+ins+after;
  const np=before.length+ins.length;
  inputEl.setSelectionRange(np,np);
  hideAC(); autogrow(); inputEl.focus();
}

inputEl.addEventListener("keydown",e=>{
  if(acBox.classList.contains("show") && acItems.length){
    if(e.key==="ArrowDown"){ e.preventDefault(); acSel=(acSel+1)%acItems.length; renderAC(); return; }
    if(e.key==="ArrowUp"){ e.preventDefault(); acSel=(acSel-1+acItems.length)%acItems.length; renderAC(); return; }
    if(e.key==="Enter"||e.key==="Tab"){ e.preventDefault(); pickAC(acSel); return; }
    if(e.key==="Escape"){ e.preventDefault(); hideAC(); return; }
  }
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }
});

function updateChartHead(i){
  if(!DATA||!DATA.open) return;
  const V=viewData(); if(!V||!V.open) return;
  const n=V.open.length; if(i==null||i<0||i>=n) i=n-1;
  const f=v=>{ if(v==null) return "—"; const a=Math.abs(v); return a>=1?v.toFixed(2):a>=0.01?v.toFixed(4):v.toPrecision(4); };
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
  set("chhPair",(CUR_PAIR||"—")); set("chhTf",TF);
  set("chhO",f(V.open[i])); set("chhH",f(V.high[i])); set("chhL",f(V.low[i])); set("chhC",f(V.close[i]));
  const up=V.close[i]>=V.open[i];
  document.querySelectorAll("#charthead .ohlc i").forEach(el=>el.style.color=up?"var(--up)":"var(--down)");
  if(V.volume){ const v=V.volume[i];
    set("chhVup", up?f(v):"—"); set("chhVmid", f(v)); set("chhVdn", up?"—":f(v)); }
}
gd.addEventListener("mousemove",ev=>{
  try{ const fl=gd._fullLayout; if(!fl||!fl.xaxis||!DATA||!DATA.date) return;
    const V=viewData(); if(!V||!V.date) return;
    const bb=gd.getBoundingClientRect(); const px=ev.clientX-bb.left-fl.xaxis._offset;
    const xv=fl.xaxis.p2d(px); const t=new Date(xv).getTime();
    let best=-1,bd=1e18; for(let k=0;k<V.date.length;k++){ const d=Math.abs(new Date(V.date[k]).getTime()-t); if(d<bd){bd=d;best=k;} }
    if(best>=0) updateChartHead(best);
  }catch(e){}
});

  const el=document.getElementById("bt-status"); el.textContent=t; el.classList.toggle("err", !!err);
}
async function runBacktest(){
  const strat=document.getElementById("bt-strat").value;
  if(!strat){ btSetStatus("pick a strategy", true); return; }
  const roi=parseFloat(document.getElementById("bt-roi").value);
  const sl=parseFloat(document.getElementById("bt-sl").value);
  const maxopen=document.getElementById("bt-maxopen").value;
  const stake=document.getElementById("bt-stake").value;
  const spec={
    strategy: strat,
    pairs: BT_PAIRS.slice(),
    minimal_roi: (!isNaN(roi)&&roi>0?{"0":roi/100}:null),   // blank = use strategy's own ROI
    stoploss: (!isNaN(sl)&&sl>0? -(Math.abs(sl)/100) : null), // blank = use strategy's own SL
    trailing_stop: document.getElementById("bt-trailing").checked,
    enable_protections: document.getElementById("bt-prot").checked,
    timeframe: document.getElementById("bt-tf").value,
    start: document.getElementById("bt-start").value||null,
    end: document.getElementById("bt-end").value||null,
    max_open_trades: maxopen?parseInt(maxopen):null,
    stake_amount: stake?parseFloat(stake):null,
  };
  if(!spec.pairs.length){ btSetStatus("pick at least one pair", true); return; }
  const btn=document.getElementById("bt-run"); btn.disabled=true;
  btSetStatus("submitting…");
  let job;
  try{
    const r=await fetch(API+"/api/backtest",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(spec)});
    const j=await r.json();
    if(!r.ok || j.ok===false){ btSetStatus(j.error||("error "+r.status), true); btn.disabled=false; return; }
    job=j.job_id;
  }catch(e){ btSetStatus("request failed: "+e, true); btn.disabled=false; return; }
  const t0=Date.now();
  BT_POLL=setInterval(async()=>{
    let s;
    try{ s=await fetch(API+"/api/backtest/"+job).then(r=>r.json()); }catch(e){ return; }
    const secs=((Date.now()-t0)/1000).toFixed(0);
    if(s.status==="running"||s.status==="queued"){ btSetStatus("running "+s.status+"… "+secs+"s"); return; }
    clearInterval(BT_POLL); BT_POLL=null; btn.disabled=false;
    if(s.status==="error"){ btSetStatus("failed: "+(s.error||"unknown"), true); return; }
    btSetStatus("done in "+secs+"s"); renderBtResult(s.result, spec);
    // auto-plot on the chart with provenance (no extra click needed)
    const tr=(s.result&&s.result.trades)||[];
    if(tr.length) plotBtTrades(tr, spec);
  }, 1500);
}

    statEl("total P&L", (pnl!=null?(pnl>0?"+":"")+pnl+"%":"—"), pcls)+
    statEl("avg P&L", (s.avg_profit_pct!=null?s.avg_profit_pct+"%":"—"))+
    statEl("max DD", (s.max_drawdown_pct!=null?s.max_drawdown_pct+"%":"—"),"neg")+
    statEl("W / L", (s.wins??"?")+" / "+(s.losses??"?"))+
    '</div>';
  if(trades.length){
    html+='<div class="bttrades"><table><thead><tr><th>#</th><th>pair</th><th>side</th><th>entry</th><th>exit</th><th>P&L%</th><th>reason</th></tr></thead><tbody>';
    trades.slice(0,500).forEach((t,i)=>{
      const p=t.profit_pct!=null?t.profit_pct:(t.profit_ratio!=null?+(t.profit_ratio*100).toFixed(2):null);
      const pc=p>0?"pos":(p<0?"neg":"");
      html+='<tr><td>'+(i+1)+'</td><td>'+(t.pair||"")+'</td><td>'+(t.is_short?"short":"long")+'</td>'+

function ftPairToUi(p){ return String(p||"").replace(/[:/]/g,"_"); }

function uiPairDisplay(p){ return String(p||"").replace(/_/g,"/").replace(/\/([^/]+)$/,":$1"); }

// register backtest result as overlay(s) — one per pair — with provenance, then auto-show.
// auto-switches the chart to the (first) backtest pair + range so trades are visible immediately.
function plotBtTrades(trades, spec){
  spec = spec || (BT_LAST&&BT_LAST.spec) || {};
  if(!trades||!trades.length){ btSetStatus("no trades to plot", true); return; }
  // group trades by pair
  const byPair=new Map();
  trades.forEach(t=>{
    const ui = t.pair ? ftPairToUi(t.pair) : (CUR_PAIR||"");
    if(!byPair.has(ui)) byPair.set(ui, []);
    byPair.get(ui).push(t);
  });
  const strat = spec.strategy || "backtest";
  const rng = (spec.start||spec.end) ? [spec.start||null, spec.end||null] : null;
  const rngTxt = rng ? (fmtDay(rng[0])+"→"+fmtDay(rng[1])) : "full range";
  // variant tag: distinguishes re-runs of the same strategy+range with different knobs,
  // so they STACK as separate overlays instead of replacing each other (Option A).
  const tags=[];
  if(spec.minimal_roi){ const v=Object.values(spec.minimal_roi)[0]; if(v!=null) tags.push("ROI"+(+(v*100).toFixed(1))+"%"); }
  if(spec.stoploss!=null) tags.push("SL"+(+(Math.abs(spec.stoploss)*100).toFixed(1))+"%");
  if(spec.trailing_stop) tags.push("trail");
  if(spec.enable_protections) tags.push("prot");
  if(spec.timeframe) tags.push(spec.timeframe);
  const variant = tags.join(" ");
  // dedup only on an IDENTICAL run (same strat+range+knobs); different knobs => new overlay.
  const runKey = strat+"|"+rngTxt+"|"+variant;
  OVERLAYS = OVERLAYS.filter(o=>o._runKey!==runKey);
  const ts=Date.now();
  let firstUi=null;
  byPair.forEach((ts_arr, ui)=>{
    const ms = ts_arr.map(t=>({
      date:t.open_date, price:t.open_rate??t.open_price,
      exit_date:t.close_date, exit_price:t.close_rate??t.close_price,
      confirmed:(t.profit_pct??t.profit_ratio??0)>=0,
    })).filter(m=>m.date&&m.price!=null);
    if(!ms.length) return;
    if(!firstUi) firstUi=ui;
    const ov = addOverlay({
      kind:"backtest", label:strat + (variant?" · "+variant:""),
      meta:uiPairDisplay(ui)+" · "+rngTxt+" · "+ms.length+" trades",
      pair:ui, range:rng, markers:ms,
    });
    ov._runKey=runKey; ov._ts=ts;
  });
  if(!firstUi){ btSetStatus("no plottable trades", true); return; }
  closeBacktest();
  // auto-switch chart to the backtest pair + range so the plot is visible right away
  if(firstUi!==CUR_PAIR){
    loadData(firstUi).then(()=>{ if(rng) jumpRange(rng[0],rng[1]); });
  } else {
    if(rng) jumpRange(rng[0],rng[1]);
    syncOverlays();
  }
}
// ---- Option B: past-backtests picker — choose which stored runs show on the chart ----
function renderPastBacktests(){
  const box=document.getElementById("bt-past"); if(!box) return;
  const runs=OVERLAYS.filter(o=>o.kind==="backtest")
    .slice().sort((a,b)=>(b._ts||0)-(a._ts||0));
  let html='<div class="btpast-head"><span class="t">Past backtests ('+runs.length+')</span>';
  if(runs.length) html+='<button class="btpast-clear" id="btpast-clear">Remove all</button>';
  html+='</div>';
  if(!runs.length){
    html+='<div class="btpast-empty">No past backtests yet. Run one above — it stays here (and on the chart) until you remove it.</div>';
    box.innerHTML=html; return;
  }
  html+='<div class="btpast-list">';
  runs.forEach(o=>{
    html+='<div class="btpast-row" data-id="'+o.id+'">'+
      '<input type="checkbox" '+(o.visible?"checked":"")+' title="show on chart">'+
      '<span class="pdot" style="background:'+o.color+'"></span>'+
      '<span class="plab">'+escHtml(o.label)+'</span>'+
      '<span class="pmeta">'+escHtml(o.meta)+'</span>'+
      '<button class="pgo" title="show on chart + zoom">↗</button>'+
      '<button class="px" title="remove">✕</button>'+
      '</div>';
  });
  html+='</div>';
  box.innerHTML=html;
  const clr=document.getElementById("btpast-clear");
  if(clr) clr.onclick=()=>{ OVERLAYS=OVERLAYS.filter(o=>o.kind!=="backtest"); syncOverlays(); saveOverlays(); renderPastBacktests(); };
  box.querySelectorAll(".btpast-row").forEach(row=>{
    const id=+row.dataset.id;
    row.querySelector("input").onchange=()=>{ toggleOverlay(id); };
    row.querySelector(".px").onclick=()=>{ removeOverlay(id); renderPastBacktests(); };
    row.querySelector(".pgo").onclick=()=>{
      const o=OVERLAYS.find(x=>x.id===id); if(!o) return;
      if(!o.visible) toggleOverlay(id);
      closeBacktest();
      if(o.pair && o.pair!==CUR_PAIR){ loadData(o.pair).then(()=>{ if(o.range) jumpRange(o.range[0],o.range[1]); syncOverlays(); }); }
      else if(o.range){ jumpRange(o.range[0],o.range[1]); }
    };
  });
}

/* ---- measure tool (TradingView style) ----------------------------------- */
// Convert a mouse event into free price-pane data coords {x, y} (NOT snapped to
// a candle/data point), or null if the click is outside the price pane.
function _measCoords(ev){
  const fl=gd._fullLayout; if(!fl||!fl.xaxis||!fl.yaxis) return null;
  const xa=fl.xaxis, ya=fl.yaxis;
  if(xa._offset==null || ya._offset==null) return null;
  const bb=gd.getBoundingClientRect();
  const px=ev.clientX-bb.left-xa._offset;
  const py=ev.clientY-bb.top -ya._offset;
  // keep inside the price pane (x within plot width, y within price-axis height)
  if(px<0 || px>xa._length) return null;
  if(py<0 || py>ya._length) return null;
  return { x: xa.p2d(px), y: ya.p2d(py) };
}
function onPlotClick(ev){
  if(!MEASURE) return;
  const c=_measCoords(ev); if(!c) return;
  if(!MEASURE_A){ MEASURE_A={x:c.x, y:c.y}; drawMeasure(MEASURE_A, null); return; }
  drawMeasure(MEASURE_A, c);
  MEASURE_A=null;            // ready for a fresh measurement on next click
}
// live preview of the second leg while the first point is set
function onMeasureMove(ev){
  if(!MEASURE || !MEASURE_A) return;
  const c=_measCoords(ev); if(!c) return;
  drawMeasure(MEASURE_A, c);
}
function _barsBetween(x0, x1){
  // count actual bars in the loaded slice between the two x values
  if(!DATA || !DATA.date) return null;
  const t0=new Date(x0).getTime(), t1=new Date(x1).getTime();
  const lo=Math.min(t0,t1), hi=Math.max(t0,t1);
  let n=0; for(const dt of DATA.date){ const t=new Date(dt).getTime(); if(t>=lo && t<=hi) n++; }
  return n>0 ? n-1 : 0;
}
function _fmtDur(ms){
  const m=Math.abs(ms)/60000; if(m<60) return Math.round(m)+"m";
  const h=m/60; if(h<48) return h.toFixed(h<10?1:0)+"h";
  return (h/24).toFixed(1)+"d";
}
function drawMeasure(a, b){
  const shapes=[], anns=[];
  if(b){
    const up = b.y>=a.y;
    const col = up ? "rgba(226,54,54,0.95)" : "rgba(38,166,91,0.95)";
    const fill= up ? "rgba(226,54,54,0.14)" : "rgba(38,166,91,0.14)";
    // shaded box between the two points
    shapes.push({type:"rect", xref:"x", yref:"y", x0:a.x, x1:b.x, y0:a.y, y1:b.y,
      fillcolor:fill, line:{width:1, color:col}, layer:"above", _meas:true});
    // diagonal line a->b
    shapes.push({type:"line", xref:"x", yref:"y", x0:a.x, y0:a.y, x1:b.x, y1:b.y,
      line:{width:1.5, color:col, dash:"dot"}, layer:"above", _meas:true});
    const dPrice=b.y-a.y;
    const dPct = a.y!==0 ? (dPrice/a.y*100) : 0;
    const bars=_barsBetween(a.x, b.x);
    const dur=_fmtDur(new Date(b.x).getTime()-new Date(a.x).getTime());
    const sign=dPrice>=0?"+":"";
    const txt = sign+dPrice.toPrecision(5)+"  "+sign+dPct.toFixed(2)+"%<br>"
              + (bars!=null?bars+" bars  ":"") + dur;
    anns.push({xref:"x", yref:"y", x:b.x, y:b.y, text:txt, showarrow:false,
      font:{size:11, color:"#fff"}, align:"left",
      bgcolor: up?"rgba(226,54,54,0.96)":"rgba(38,166,91,0.96)",
      bordercolor:"#0d0d0d", borderwidth:1, borderpad:4,
      xanchor: (new Date(b.x)>=new Date(a.x))?"left":"right",
      yanchor: up?"bottom":"top", _meas:true});
  } else {
    // first point marker only
    shapes.push({type:"line", xref:"x", yref:"y", x0:a.x, x1:a.x, y0:a.y, y1:a.y,
      line:{width:6, color:"#e3b341"}, layer:"above", _meas:true});
    anns.push({xref:"x", yref:"y", x:a.x, y:a.y, text:"click 2nd point", showarrow:false,
      font:{size:10, color:"#0d0d0d"}, bgcolor:"#e3b341", borderpad:3, yanchor:"bottom", _meas:true});
  }
  const keepS=(gd.layout.shapes||[]).filter(s=>!s._meas);
  const keepA=(gd.layout.annotations||[]).filter(s=>!s._meas);
  Plotly.relayout(gd, {shapes:keepS.concat(shapes), annotations:keepA.concat(anns)});
}
function clearMeasure(){
  const keepS=(gd.layout.shapes||[]).filter(s=>!s._meas);
  const keepA=(gd.layout.annotations||[]).filter(s=>!s._meas);
  Plotly.relayout(gd, {shapes:keepS, annotations:keepA});
}

/* ---- Y-axis zoom strip: drag up/down on the left edge to zoom price scale --- */
function installYZone(){
  const yz=document.getElementById("yzone"); if(!yz) return;
  let st=null;  // {py, ylo, yhi, len}
  yz.addEventListener("mousedown",(e)=>{
    const ya=gd._fullLayout.yaxis;
    const [ylo,yhi]=ya.range.map(Number);
    st={py:e.clientY, ylo, yhi, len:Math.max(60, ya._length)};
    if(YMODE!=="manual") setYMode("manual");   // freeze y so the zoom persists
    yz.classList.add("dragging"); e.preventDefault();
  });
  window.addEventListener("mousemove",(e)=>{
    if(!st) return;
    // drag up = zoom in (tighter), drag down = zoom out
    const d=(st.py-e.clientY);
    const k=Math.pow(0.4, d/st.len);
    const yc=(st.ylo+st.yhi)/2, yh=(st.yhi-st.ylo)/2*k;
    Plotly.relayout(gd,{"yaxis.range":[yc-yh, yc+yh]});
  });
  window.addEventListener("mouseup",()=>{ if(st){ st=null; yz.classList.remove("dragging"); } });
  // double-click the strip resets the price axis to auto
  yz.addEventListener("dblclick",()=> setYMode("auto"));
}

// Drag the horizontal handle to resize the bottom subplot pane. Moving it DOWN
// shrinks the subplots (price grows); moving UP grows them. Re-renders the chart
// with the new SUBPLOT_SPLIT (debounced so dragging stays smooth) and persists it.
function installSubsplit(){
  const ss=document.getElementById("subsplit"); if(!ss) return;
  let st=null, raf=null;
  const clamp=(v)=>Math.max(0.15, Math.min(0.85, v));
  ss.addEventListener("mousedown",(e)=>{
    const fl=gd._fullLayout; if(!fl||!fl.yaxis) return;
    // total drawable plot height in px (between top and bottom of the full stack)
    const top=fl.yaxis._offset;                       // px from chart top to price-pane top (paper y=1)
    const bottom=fl.yaxis2 ? (fl.yaxis2._offset+fl.yaxis2._length) : (fl.yaxis._offset+fl.yaxis._length);
    st={py:e.clientY, top, height:Math.max(80, bottom-top), start:SUBPLOT_SPLIT};
    ss.classList.add("dragging");
    document.body.style.userSelect="none";
    e.preventDefault();
  });
  window.addEventListener("mousemove",(e)=>{
    if(!st) return;
    // paper-y increases upward; moving the mouse DOWN lowers paper-y => smaller split
    const dPaper=(e.clientY-st.py)/st.height;          // px -> paper fraction
    SUBPLOT_SPLIT=clamp(st.start - dPaper);
    // move the handle immediately for a smooth feel; re-render on the next frame
    const oy=gd.getBoundingClientRect().top-document.getElementById("chartcol").getBoundingClientRect().top;
    ss.style.top=(oy + st.top + (1-SUBPLOT_SPLIT)*st.height - 4)+"px";
    if(!raf) raf=requestAnimationFrame(()=>{ raf=null; render(true); });
  });
  window.addEventListener("mouseup",()=>{
    if(!st) return;
    st=null; ss.classList.remove("dragging"); document.body.style.userSelect="";
    localStorage.setItem("cs_subsplit", String(SUBPLOT_SPLIT));
    render(true);
  });
  // double-click resets to the default split
  ss.addEventListener("dblclick",()=>{ SUBPLOT_SPLIT=0.435; localStorage.setItem("cs_subsplit","0.435"); render(true); });
}

/* ---- TradingView-style scroll-to-zoom on the time axis -------------------- */
function installWheelZoom(){
  let wheelTimer=null;
  gd.addEventListener("wheel", (e)=>{
    const xa = gd._fullLayout && gd._fullLayout.xaxis;
    if(!xa) return;
    e.preventDefault();
    // current x range as numbers (ms epoch for date axes)
    let [r0,r1] = xa.range.map(v=> (typeof v==="string"? new Date(v).getTime() : (xa.type==="date"? new Date(v).getTime() : +v)));
    if(!isFinite(r0)||!isFinite(r1)) return;
    // cursor x in data coords -> zoom anchor (keeps point under cursor fixed)
    const bb = gd.getBoundingClientRect();
    const px = e.clientX - bb.left;
    const frac = Math.min(1, Math.max(0, (px - xa._offset) / xa._length));
    const anchor = r0 + (r1 - r0) * frac;
    // scroll up (deltaY<0) => zoom in; factor per notch
    const k = e.deltaY < 0 ? 0.82 : 1.22;
    const n0 = anchor - (anchor - r0) * k;
    const n1 = anchor + (r1 - anchor) * k;
    const toV = (ms)=> xa.type==="date" ? new Date(ms).toISOString() : ms;
    Plotly.relayout(gd, {"xaxis.range":[toV(n0), toV(n1)]});
    // debounce the data-slice reload (same pattern as drag-zoom)
    clearTimeout(wheelTimer);
    wheelTimer=setTimeout(()=>reloadSlice(toV(n0), toV(n1)), 220);
  }, {passive:false});
}
